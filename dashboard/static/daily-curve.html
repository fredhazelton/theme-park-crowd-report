<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wait Time Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           DESIGN SYSTEM — HazeyData Brand
           Navy #0a1628 · Red #A60038 · Cyan #4a90a4
           JetBrains Mono + Inter
           ═══════════════════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f1d32;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --bg-glass: rgba(255,255,255,0.04);
            --border-card: rgba(255,255,255,0.08);
            --border-accent: rgba(74,144,164,0.3);
            --accent: #4a90a4;
            --accent-light: #6bb5c9;
            --accent-glow: rgba(74,144,164,0.15);
            --accent-red: #A60038;
            --accent-red-light: #e05577;
            --accent-green: #4ade80;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --font-text: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            font-family: var(--font-text);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(74,144,164,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,144,164,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient gradient orbs — dark glassmorphism depth */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(74,144,164,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientFloat 20s ease-in-out infinite;
        }

        @keyframes ambientFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 30px) scale(1.05); }
            66% { transform: translate(20px, -20px) scale(0.95); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, input {
            padding: 10px 15px;
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:hover, input:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .chart-container {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 20px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .observed-actual { background: linear-gradient(90deg, var(--accent-green), #22c55e); }
        .predicted-actual { background: linear-gradient(90deg, var(--accent-light), var(--accent)); }
        .posted-dots { background: var(--text-muted); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--border-accent);
            box-shadow: 0 4px 20px rgba(74,144,164,0.1);
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-light);
        }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .entity-name {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--accent);
            margin-top: 5px;
        }

        /* Accessibility: focus-visible outlines */
        select:focus-visible, input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 1.4rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .chart-wrapper { height: 350px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Daily Wait Time Curve</h1>
                <div class="entity-name" id="entityName">Select an entity</div>
            </div>
            <div class="controls">
                <select id="parkSelect">
                    <option value="mk">Magic Kingdom</option>
                    <option value="ep">EPCOT</option>
                    <option value="hs">Hollywood Studios</option>
                    <option value="ak">Animal Kingdom</option>
                </select>
                <select id="entitySelect">
                    <option value="">Loading...</option>
                </select>
                <input type="date" id="dateSelect" />
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="waitTimeChart"></canvas>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color observed-actual"></div>
                    <span>Observed Actual</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color predicted-actual"></div>
                    <span>Predicted Actual</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot posted-dots"></div>
                    <span>Posted Wait Time</span>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="avgActual">--</div>
                    <div class="stat-label">Avg Actual</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgPosted">--</div>
                    <div class="stat-label">Avg Posted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="peakTime">--</div>
                    <div class="stat-label">Peak Time</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="peakWait">--</div>
                    <div class="stat-label">Peak Wait</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8051/api';
        let chart = null;
        
        // Entity name mapping (add more as needed)
        const ENTITY_NAMES = {
            'MK01': 'Space Mountain',
            'MK02': 'Splash Mountain',
            'MK03': 'Big Thunder Mountain',
            'MK05': 'Pirates of the Caribbean',
            'MK06': 'Haunted Mansion',
            'MK13': 'Peter Pan\'s Flight',
            'MK16': 'Jungle Cruise',
            'MK23': 'Pirates of the Caribbean',
            'MK27': 'It\'s a Small World',
            'MK29': 'Seven Dwarfs Mine Train',
            'MK34': 'Buzz Lightyear',
            'MK43': 'TRON Lightcycle',
            'MK142': 'Tiana\'s Bayou Adventure',
            'HS12': 'Tower of Terror',
            'HS15': 'Rock \'n\' Roller Coaster',
            'HS20': 'Toy Story Mania',
            'HS22': 'Star Tours',
            'AK11': 'Kilimanjaro Safaris',
            'EP02': 'Test Track',
            'EP09': 'Frozen Ever After',
        };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date to yesterday
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            document.getElementById('dateSelect').value = yesterday.toISOString().split('T')[0];
            
            loadEntities();
            
            document.getElementById('parkSelect').addEventListener('change', loadEntities);
            document.getElementById('entitySelect').addEventListener('change', loadChart);
            document.getElementById('dateSelect').addEventListener('change', loadChart);
        });
        
        async function loadEntities() {
            const park = document.getElementById('parkSelect').value;
            const select = document.getElementById('entitySelect');
            
            try {
                const resp = await fetch(`${API_BASE}/predictions/entities?park=${park}`);
                const data = await resp.json();
                
                select.innerHTML = data.entities
                    .filter(e => e.method === 'model')  // Only show entities with models
                    .slice(0, 50)  // Top 50
                    .map(e => {
                        const name = ENTITY_NAMES[e.entity_code] || e.entity_code;
                        return `<option value="${e.entity_code}">${e.entity_code} - ${name}</option>`;
                    })
                    .join('');
                
                if (select.options.length > 0) {
                    loadChart();
                }
            } catch (err) {
                console.error('Failed to load entities:', err);
                select.innerHTML = '<option value="">Error loading entities</option>';
            }
        }
        
        async function loadChart() {
            const entityCode = document.getElementById('entitySelect').value;
            const date = document.getElementById('dateSelect').value;
            
            if (!entityCode || !date) return;
            
            const entityName = ENTITY_NAMES[entityCode] || entityCode;
            document.getElementById('entityName').textContent = entityName;
            
            try {
                // Load predictions (includes posted and predicted actual)
                const predResp = await fetch(
                    `${API_BASE}/predictions/mk/daily-curve?entity_code=${entityCode}&date=${date}`
                );
                const predData = await predResp.json();
                
                // Load actual observed data if available
                const actualResp = await fetch(
                    `${API_BASE}/actual-points/mk?entity_code=${entityCode}&date=${date}`
                );
                let actualData = { points: [] };
                try {
                    actualData = await actualResp.json();
                } catch (e) {}
                
                renderChart(predData, actualData);
                
            } catch (err) {
                console.error('Failed to load chart data:', err);
            }
        }
        
        function renderChart(predData, actualData) {
            const ctx = document.getElementById('waitTimeChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }
            
            // Process prediction data
            const curve = predData.curve || [];
            
            // Separate by time and aggregate by 15-min intervals
            const timeSlots = {};
            
            curve.forEach(point => {
                const time = new Date(point.time);
                // Round to 15-min intervals
                const minutes = Math.floor(time.getMinutes() / 15) * 15;
                time.setMinutes(minutes, 0, 0);
                const key = time.toISOString();
                
                if (!timeSlots[key]) {
                    timeSlots[key] = {
                        time: time,
                        predicted: [],
                        posted: []
                    };
                }
                
                timeSlots[key].predicted.push(point.predicted);
                timeSlots[key].posted.push(point.posted);
            });
            
            // Process actual observed data
            const actualPoints = (actualData.points || []).map(p => ({
                x: new Date(p.time || p.observed_at),
                y: p.actual || p.wait_time_minutes
            })).filter(p => p.y > 0);
            
            // Convert to arrays
            const sortedSlots = Object.values(timeSlots).sort((a, b) => a.time - b.time);
            
            const predictedData = sortedSlots.map(slot => ({
                x: slot.time,
                y: slot.predicted.reduce((a, b) => a + b, 0) / slot.predicted.length
            }));
            
            const postedData = sortedSlots.map(slot => ({
                x: slot.time,
                y: slot.posted.reduce((a, b) => a + b, 0) / slot.posted.length
            }));
            
            // Calculate stats
            if (predictedData.length > 0) {
                const avgPred = predictedData.reduce((a, b) => a + b.y, 0) / predictedData.length;
                const avgPost = postedData.reduce((a, b) => a + b.y, 0) / postedData.length;
                const peak = predictedData.reduce((max, p) => p.y > max.y ? p : max, predictedData[0]);
                
                document.getElementById('avgActual').textContent = Math.round(avgPred) + ' min';
                document.getElementById('avgPosted').textContent = Math.round(avgPost) + ' min';
                document.getElementById('peakTime').textContent = peak.x.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                document.getElementById('peakWait').textContent = Math.round(peak.y) + ' min';
            }
            
            // Build datasets
            const datasets = [];
            
            // Observed actuals (if available) - Brand green area
            if (actualPoints.length > 0) {
                datasets.push({
                    label: 'Observed Actual',
                    data: actualPoints,
                    fill: true,
                    backgroundColor: 'rgba(74, 222, 128, 0.25)',
                    borderColor: '#4ade80',
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 0,
                    order: 2
                });
            }
            
            // Predicted actuals - Brand cyan area
            datasets.push({
                label: 'Predicted Actual',
                data: predictedData,
                fill: true,
                backgroundColor: actualPoints.length > 0 ? 'rgba(74, 144, 164, 0.25)' : 'rgba(74, 144, 164, 0.4)',
                borderColor: '#6bb5c9',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 0,
                order: 1
            });
            
            // Posted times - Subtle muted dots
            datasets.push({
                label: 'Posted Wait',
                data: postedData,
                fill: false,
                backgroundColor: 'rgba(255,255,255,0.3)',
                borderColor: 'transparent',
                pointRadius: 3,
                pointHoverRadius: 5,
                showLine: false,
                order: 0
            });
            
            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 29, 50, 0.95)',
                            titleColor: '#fff',
                            bodyColor: 'rgba(255,255,255,0.8)',
                            borderColor: 'rgba(74,144,164,0.3)',
                            borderWidth: 1,
                            padding: 12,
                            titleFont: { family: "'JetBrains Mono', monospace", size: 13 },
                            bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
                            callbacks: {
                                title: (items) => {
                                    const date = new Date(items[0].parsed.x);
                                    return date.toLocaleTimeString('en-US', { 
                                        hour: 'numeric', 
                                        minute: '2-digit',
                                        hour12: true 
                                    });
                                },
                                label: (item) => {
                                    return `${item.dataset.label}: ${Math.round(item.parsed.y)} min`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'hour',
                                displayFormats: {
                                    hour: 'h a'
                                }
                            },
                            grid: {
                                color: 'rgba(74,144,164,0.06)'
                            },
                            ticks: {
                                color: 'rgba(255,255,255,0.4)',
                                font: { family: "'JetBrains Mono', monospace", size: 11 }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(74,144,164,0.06)'
                            },
                            ticks: {
                                color: 'rgba(255,255,255,0.4)',
                                font: { family: "'JetBrains Mono', monospace", size: 11 },
                                callback: (value) => value + ' min'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
