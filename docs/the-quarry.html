<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quarry &#x26cf; HazeyData Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:          #080f1e;
    --bg-card:     rgba(10, 26, 52, 0.88);
    --bg-hover:    rgba(16, 36, 66, 0.92);
    --cyan:        #5ab4cc;
    --cyan-dim:    rgba(90, 180, 204, 0.20);
    --cyan-glow:   rgba(90, 180, 204, 0.06);
    --gold:        #c9a227;
    --gold-dim:    rgba(201, 162, 39, 0.17);
    --orchid:      #9b7fb6;
    --orchid-dim:  rgba(155, 127, 182, 0.17);
    --slate:       #8892b0;
    --slate-dim:   rgba(136, 146, 176, 0.13);
    --burnt:       #e07b54;
    --burnt-dim:   rgba(224, 123, 84, 0.17);
    --text:        #e9f4ff;
    --text-dim:    rgba(233, 244, 255, 0.54);
    --text-faint:  rgba(233, 244, 255, 0.27);
    --border:      rgba(90, 180, 204, 0.14);
    --border-hi:   rgba(90, 180, 204, 0.36);
    --mono:        'JetBrains Mono', monospace;
    --sans:        'Inter', sans-serif;
}

html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

/* ── HEADER ─────────────────────────────────────────────── */
.hdr {
    background: rgba(8,15,30,0.98);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px; height: 52px;
    backdrop-filter: blur(10px);
}
.hdr-logo {
    font-family: var(--mono); font-size: 15px; font-weight: 600;
    color: var(--cyan); letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px;
}
.hdr-logo .sep  { color: var(--border-hi); }
.hdr-logo .sub  { color: var(--text-dim); font-weight: 400; font-size: 12px; }
.hdr-meta  { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
.pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 7px var(--cyan);
    animation: pulse 2.5s ease-in-out infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── TAB NAV ────────────────────────────────────────────── */
.tab-nav {
    background: rgba(8,15,30,0.98);
    border-bottom: 1px solid var(--border);
    padding: 0 28px; display: flex;
    position: sticky; top: 52px; z-index: 90;
    backdrop-filter: blur(10px); overflow-x: auto;
}
.tab-btn {
    padding: 12px 20px; background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim); font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: color .15s, border-color .15s;
}
.tab-btn:hover  { color: var(--text); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── TAB PANELS ─────────────────────────────────────────── */
.tab-pane { display: none; padding: 24px 28px 52px; max-width: 1380px; margin: 0 auto; }
.tab-pane.active { display: block; }

/* ── SECTION TITLE ──────────────────────────────────────── */
.st {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--cyan); text-transform: uppercase; letter-spacing: 1.8px;
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.st::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── CARD ────────────────────────────────────────────────── */
.card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    transition: border-color .15s;
}
.card:hover { border-color: var(--border-hi); }

/* ── KPI STRIP ──────────────────────────────────────────── */
.kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(148px,1fr));
    gap: 10px; margin-bottom: 22px;
}
.kpi {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; text-align: center;
    transition: border-color .15s;
}
.kpi:hover { border-color: var(--border-hi); }
.kpi-lbl { font-size: 9px; font-family: var(--mono); color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
.kpi-val { font-size: 26px; font-weight: 700; color: var(--cyan); line-height: 1; margin-bottom: 5px; }
.kpi-sub { font-size: 10px; color: var(--text-faint); }

/* ── STAT GRID ──────────────────────────────────────────── */
.stat-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(126px,1fr));
    gap: 10px; margin-bottom: 20px;
}
.sbox {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; text-align: center;
}
.sval  { font-size: 22px; font-weight: 700; color: var(--cyan); font-family: var(--mono); line-height: 1; }
.slbl  { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; margin-top: 5px; }

/* ── GRIDS ──────────────────────────────────────────────── */
.g2    { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.g3    { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.g-auto{ display: grid; grid-template-columns: repeat(auto-fill, minmax(288px,1fr)); gap: 14px; }
.mb4   { margin-bottom: 4px; }
.mb8   { margin-bottom: 8px; }
.mb14  { margin-bottom: 14px; }
.mb20  { margin-bottom: 20px; }
.mb24  { margin-bottom: 24px; }
.fb    { display: flex; justify-content: space-between; align-items: center; }
.fc    { display: flex; align-items: center; }

/* ── PROGRESS BAR ───────────────────────────────────────── */
.prog  { height: 3px; background: rgba(90,180,204,.1); border-radius: 2px; overflow: hidden; }
.prog-f{ height: 100%; border-radius: 2px; background: var(--cyan); }

/* ── BADGES ─────────────────────────────────────────────── */
.badge {
    display: inline-flex; align-items: center; padding: 2px 7px;
    border-radius: 3px; font-size: 9px; font-family: var(--mono);
    font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    white-space: nowrap;
}
.b-active,.b-done    { background:var(--cyan-dim);   color:var(--cyan);   }
.b-planning          { background:var(--gold-dim);   color:var(--gold);   }
.b-paused,.b-backlog,.b-todo,.b-low
                     { background:var(--slate-dim);  color:var(--slate);  }
.b-blocked,.b-review { background:var(--orchid-dim); color:var(--orchid); }
.b-critical          { background:var(--burnt-dim);  color:var(--burnt);  }
.b-high              { background:var(--cyan-dim);   color:var(--cyan);   }
.b-medium            { background:var(--gold-dim);   color:var(--gold);   }
.b-recurring         { background:var(--cyan-dim);   color:var(--cyan);   border:1px dashed rgba(90,180,204,.45); }
.b-setup             { background:var(--gold-dim);   color:var(--gold);   }

/* ── PROJECT CARD ───────────────────────────────────────── */
.proj-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .15s;
}
.proj-card:hover { border-color: var(--border-hi); }
.proj-name  { font-weight: 600; font-size: 14px; }
.proj-desc  { font-size: 12px; color: var(--text-dim); line-height: 1.55; flex: 1; }
.proj-pct   { font-size: 17px; font-weight: 700; color: var(--cyan); font-family: var(--mono); }

/* ── TASK ITEMS ─────────────────────────────────────────── */
.task-item {
    display: flex; flex-direction: column; gap: 5px;
    padding: 10px 14px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 6px;
    transition: border-color .15s;
}
.task-item:hover   { border-color: var(--border-hi); }
.task-title        { font-weight: 500; font-size: 13px; }
.task-notes        { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
.task-foot         { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-faint); flex-wrap: wrap; }
.tag               { padding: 1px 6px; border-radius: 3px; background: var(--slate-dim); color: var(--slate); font-family: var(--mono); font-size: 9px; }

/* ── FILTER BAR ─────────────────────────────────────────── */
.fbar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.fchip {
    padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border);
    background: none; color: var(--text-dim); font-size: 11px;
    cursor: pointer; font-family: var(--sans); transition: all .12s;
}
.fchip.active { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(90,180,204,.38); }
.fchip:hover  { border-color: var(--border-hi); color: var(--text); }

/* ── SOCIAL CARDS ───────────────────────────────────────── */
.soc-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s;
}
.soc-card:hover  { border-color: var(--border-hi); }
.soc-plat  { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--cyan); }
.soc-hndl  { font-size: 12px; color: var(--text-dim); }
.soc-stats { display: flex; gap: 18px; }
.soc-val   { font-size: 20px; font-weight: 700; color: var(--text); }
.soc-lbl   { font-size: 10px; color: var(--text-faint); margin-top: 2px; }

/* ── FINANCE TABLE ──────────────────────────────────────── */
.fin-table  { width: 100%; border-collapse: collapse; font-size: 12px; }
.fin-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.fin-table tr:last-child td { border-bottom: none; }
.ft-em  { width: 28px; font-size: 14px; }
.ft-n   { color: var(--text); }
.ft-v   { text-align: right; font-family: var(--mono); color: var(--cyan); font-weight: 600; }
.fin-note { padding: 9px 12px; font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); line-height: 1.55; }

/* ── INTEL SUB-TABS ─────────────────────────────────────── */
.itabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.itab  {
    padding: 8px 14px; background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim); font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: var(--sans); transition: color .12s, border-color .12s;
}
.itab.active  { color: var(--cyan); border-bottom-color: var(--cyan); }
.itab:hover   { color: var(--text); }
.ipanel       { display: none; }
.ipanel.active{ display: block; }

/* ── INTEL ITEMS ────────────────────────────────────────── */
.intel-item   { padding: 11px 0; border-bottom: 1px solid var(--border); }
.intel-item:last-child { border-bottom: none; }
.intel-title  { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.intel-title a{ color: var(--text); text-decoration: none; }
.intel-title a:hover { color: var(--cyan); }
.intel-snip   { font-size: 11px; color: var(--text-dim); line-height: 1.55; margin-bottom: 5px; }
.intel-meta   { display: flex; gap: 12px; font-size: 10px; color: var(--text-faint); font-family: var(--mono); }

/* ── DISCORD FEED ───────────────────────────────────────── */
.dc-item     { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.dc-item:last-child { border-bottom: none; }
.dc-hdr      { display: flex; align-items: center; gap: 7px; font-size: 11px; margin-bottom: 4px; }
.dc-chan      { font-family: var(--mono); color: var(--cyan); }
.dc-agent    { color: var(--text-dim); }
.dc-ts       { margin-left: auto; color: var(--text-faint); font-family: var(--mono); }
.dc-msg      { font-size: 12px; color: var(--text); line-height: 1.5; }

/* ── IDEA CARD ──────────────────────────────────────────── */
.idea-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .15s;
}
.idea-card:hover { border-color: var(--border-hi); }
.idea-ttl   { font-weight: 600; font-size: 13px; }
.idea-desc  { font-size: 12px; color: var(--text-dim); line-height: 1.55; flex: 1; }
.idea-foot  { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--text-faint); }

/* ── CALENDAR ───────────────────────────────────────────── */
.cal-grid      { display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; }
.cal-day       { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
.cal-day-name  { font-family: var(--mono); font-size: 10px; color: var(--cyan); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
.cal-ev        { font-size: 10px; padding: 4px 7px; border-radius: 3px; margin-bottom: 4px; background: var(--slate-dim); }
.cal-time      { font-family: var(--mono); color: var(--cyan); display: block; font-size: 9px; margin-bottom: 1px; }
.cal-evname    { color: var(--text-dim); }
.cal-own       { color: var(--text-faint); font-size: 9px; }
.always-grid   { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 10px; margin-bottom: 22px; }
.always-item   { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.always-name   { font-size: 12px; font-weight: 600; }
.always-dtl    { font-size: 10px; color: var(--text-faint); font-family: var(--mono); margin-top: 2px; }

/* ── DATA TABLE ─────────────────────────────────────────── */
.dtable           { width: 100%; border-collapse: collapse; font-size: 12px; }
.dtable th        { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--cyan); text-transform: uppercase; letter-spacing: .7px; padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
.dtable th:hover  { color: var(--text); }
.dtable th.sorted { color: var(--text); }
.dtable td        { padding: 7px 10px; border-bottom: 1px solid rgba(90,180,204,.07); }
.dtable tr:hover td { background: var(--bg-hover); cursor: pointer; }
.num   { font-family: var(--mono); text-align: right; }
.c-c   { color: var(--cyan); }
.c-g   { color: var(--gold); }
.c-d   { color: var(--text-dim); font-size: 11px; }
.c-f   { color: var(--text-faint); }

/* ── CHART WRAP ─────────────────────────────────────────── */
.chart-wrap { position: relative; height: 260px; }

/* ── NOTE BAR ───────────────────────────────────────────── */
.note-bar { font-size: 11px; color: var(--text-dim); background: var(--cyan-glow); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; line-height: 1.6; }

/* ── ENTITY EXPLORER ────────────────────────────────────── */
.exp-ctrl { display: flex; gap: 12px; margin-bottom: 12px; }
.exp-ctrl-g { flex: 1; }
.exp-ctrl-g label { display: block; font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.exp-ctrl-g select {
    width: 100%; padding: 8px 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: 12px; outline: none; cursor: pointer;
}
.exp-ctrl-g select:focus { border-color: var(--cyan); }
.exp-ctrl-g select option, .exp-ctrl-g select optgroup { background: #0d1f3c; color: var(--text); }
.exp-stats { display: flex; gap: 10px; margin-top: 12px; }
.exp-stat  { flex: 1; text-align: center; padding: 8px; background: var(--slate-dim); border-radius: 6px; }
.exp-sv    { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); }
.exp-sl    { font-size: 10px; color: var(--text-faint); font-family: var(--mono); letter-spacing: .5px; }

/* ── SCOREBOARD ─────────────────────────────────────────── */
.sb-search input {
    width: 100%; padding: 8px 12px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
    margin-bottom: 10px;
}
.sb-search input:focus { border-color: var(--cyan); }
.sb-search input::placeholder { color: var(--text-faint); }
.sb-wrap { max-height: 440px; overflow-y: auto; border-radius: 6px; }
.sb-wrap::-webkit-scrollbar { width: 4px; }
.sb-wrap::-webkit-scrollbar-track { background: transparent; }
.sb-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.ptag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 500;
    background: rgba(255,255,255,0.05); color: var(--text-dim);
}
.p-mk { background: rgba(99,102,241,.14); color: #a5b4fc; }
.p-ep { background: rgba(168,85,247,.14); color: #c4b5fd; }
.p-hs { background: rgba(236,72,153,.14); color: #f9a8d4; }
.p-ak { background: rgba(34,197,94,.14);  color: #86efac; }
.p-dl { background: rgba(14,165,233,.14); color: #7dd3fc; }
.p-ca { background: rgba(90,180,204,.14); color: #5ab4cc; }
.p-uf { background: rgba(224,123,84,.14); color: #fdba74; }
.p-uh { background: rgba(244,63,94,.14);  color: #fda4af; }
.p-ia { background: rgba(20,184,166,.14); color: #5eead4; }
.p-eu { background: rgba(249,115,22,.14); color: #fdba74; }
.p-tdl{ background: rgba(155,127,182,.14);color: #c4b5fd; }

/* ── LOADING ────────────────────────────────────────────── */
.loading { text-align: center; padding: 48px 20px; color: var(--text-faint); font-family: var(--mono); font-size: 12px; }

/* ── PARK BARS ──────────────────────────────────────────── */
.pbar-rows { display: flex; flex-direction: column; gap: 8px; }
.pbar-row  { display: grid; grid-template-columns: 160px 1fr 56px; align-items: center; gap: 12px; }
.pbar-name { font-family: var(--mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pbar-track{ height: 20px; background: var(--slate-dim); border-radius: 4px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 4px; min-width: 2px; transition: width .6s ease; }
.pbar-val  { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: right; }

@media (max-width: 860px) {
    .tab-pane { padding: 16px 14px 48px; }
    .g2, .g3 { grid-template-columns: 1fr; }
    .cal-grid { grid-template-columns: repeat(4, 1fr); }
    .hdr-logo .sub { display: none; }
}
    </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header class="hdr">
    <div class="hdr-logo">
        <span>&#x26cf; The Quarry</span>
        <span class="sep">/</span>
        <span class="sub">HazeyData Analytics</span>
    </div>
    <div class="pulse-dot"></div>
    <div class="hdr-meta" id="hdr-meta">Loading&hellip;</div>
</header>

<!-- ── TAB NAV ───────────────────────────────────────────── -->
<nav class="tab-nav">
    <button class="tab-btn active"  data-tab="overview">Overview</button>
    <button class="tab-btn"         data-tab="accuracy">Accuracy</button>
    <button class="tab-btn"         data-tab="projects">Projects</button>
    <button class="tab-btn"         data-tab="social">Social &amp; Finance</button>
    <button class="tab-btn"         data-tab="intel">Intel</button>
    <button class="tab-btn"         data-tab="ideas">Ideas</button>
    <button class="tab-btn"         data-tab="calendar">Calendar</button>
</nav>

<!-- ── TAB PANELS ────────────────────────────────────────── -->
<div id="overview" class="tab-pane active"><div class="loading">Loading&hellip;</div></div>
<div id="accuracy" class="tab-pane"><div class="loading">Loading&hellip;</div></div>
<div id="projects" class="tab-pane"><div class="loading">Loading&hellip;</div></div>
<div id="social"   class="tab-pane"><div class="loading">Loading&hellip;</div></div>
<div id="intel"    class="tab-pane"><div class="loading">Loading&hellip;</div></div>
<div id="ideas"    class="tab-pane"><div class="loading">Loading&hellip;</div></div>
<div id="calendar" class="tab-pane"><div class="loading">Loading&hellip;</div></div>

<script>
'use strict';

/* ── STATE ──────────────────────────────────────────────── */
const D = {};
const rendered = new Set();
const charts   = {};
const sortState = { col: 'avg_mae', asc: true };

/* ── TAB SWITCHING ──────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tab).classList.add('active');
        if (!rendered.has(tab)) { rendered.add(tab); renderTab(tab); }
    });
});

/* ── DATA LOADING ───────────────────────────────────────── */
async function loadAll() {
    const files = [

        ['entities', 'entity_list.json'],
        ['datesIdx', 'entity_dates_index.json'],
        ['proj',     'projects.json'],
        ['tasks',    'tasks.json'],
        ['social',   'social.json'],
        ['fin',      'finance.json'],
        ['disc',     'discord.json'],
        ['comp',     'competitor-watch.json'],
        ['ideas',    'ideas.json'],
        ['cal',      'calendar.json'],
    ];
    await Promise.all(files.map(async ([key, fname]) => {

        } catch (e) { D[key] = null; }

}

/* ── HELPERS ────────────────────────────────────────────── */
function fmtDate(s) {
    if (!s) return '\u2014';
    const d = new Date(s);
    if (isNaN(d)) return String(s);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function relTime(s) {
    if (!s) return '';
    const diff = Date.now() - new Date(s).getTime();
    if (isNaN(diff) || diff < 0) return '';
    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
    if (h > 48) return Math.floor(h / 24) + 'd ago';
    if (h > 0)  return h + 'h ago';
    if (m > 0)  return m + 'm ago';
    return 'just now';
}
function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '\u2026' : (s || ''); }
function he(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function badge(text, cls) {
    const c = (cls || text || '').toLowerCase().replace(/[^a-z0-9]/g,'-');
    return '<span class="badge b-' + c + '">' + he(text || cls || '') + '</span>';
}
function parkCls(p) {
    if (!p) return '';
    const l = p.toLowerCase();
    if (l.includes('magic kingdom'))   return 'p-mk';
    if (l.includes('epcot'))           return 'p-ep';
    if (l.includes('hollywood'))       return 'p-hs';
    if (l.includes('animal'))          return 'p-ak';
    if (l.includes('disneyland'))      return 'p-dl';
    if (l.includes('california'))      return 'p-ca';
    if (l.includes('islands'))         return 'p-ia';
    if (l.includes('epic universe'))   return 'p-eu';
    if (l.includes('universal'))       return 'p-uf';
    if (l.includes('tokyo'))           return 'p-tdl';
    return '';
}
function shortPark(p) {
    const m = {'Magic Kingdom':'MK','EPCOT':'EP','Hollywood Studios':'HS','Animal Kingdom':'AK','Disneyland':'DL','DCA':'DCA','Islands of Adventure':'IA','Epic Universe':'EU','Tokyo Disneyland':'TDL','Tokyo DisneySea':'TDS'};
    return m[p] || (p || '').slice(0, 5);
}

function populateEntityDropdown() {
    const sel = document.getElementById('entitySel');
    if (!sel || !D.entities) return;
    const byPark = {};
    (D.entities || []).forEach(e => { if (!byPark[e.park]) byPark[e.park] = []; byPark[e.park].push(e); });
    let html = '<option value="">Select entity&hellip;</option>';
    Object.keys(byPark).sort().forEach(park => {
        html += `<optgroup label="${he(park)}">`;
        byPark[park].sort((a,b) => a.name.localeCompare(b.name)).forEach(e => {
            html += `<option value="${he(e.entity_code)}">${he(e.name)} (${he(e.entity_code)})</option>`;
        });
        html += '</optgroup>';
    });
    sel.innerHTML = html;
}

function onEntityChange() {
    const sel = document.getElementById('entitySel');
    if (!sel) return;
    const entity = sel.value;
    const dateSel = document.getElementById('dateSel');
    if (!entity) { if (dateSel) dateSel.innerHTML = '<option value="">Select entity first&hellip;</option>'; clearEntityChart(); return; }
    const dates = (D.datesIdx && D.datesIdx[entity]) || [];
    if (!dates.length) { if (dateSel) dateSel.innerHTML = '<option value="">No dates available</option>'; return; }
    const sorted = [...dates].sort().reverse();
    if (dateSel) {
        dateSel.innerHTML = sorted.map(d => `<option value="${he(d)}">${he(d)}</option>`).join('');
        dateSel.value = sorted[0];
    }
    loadEntityCurve();
}

async function loadEntityCurve() {
    const entitySel = document.getElementById('entitySel');
    const dateSel   = document.getElementById('dateSel');
    if (!entitySel || !dateSel) return;
    const entity = entitySel.value, date = dateSel.value;
    if (!entity || !date) { clearEntityChart(); return; }
    try {
        const r = await fetch(`analytics-data/entity_curves/${entity}/${date}.json?t=${Date.now()}`);
        if (!r.ok) throw new Error();
        renderEntityChart(await r.json());
    } catch { clearEntityChart(); }
}

function renderEntityChart(data) {
    const canvas = document.getElementById('entity-chart');
    if (!canvas) return;
    if (!data || !data.length) { clearEntityChart(); return; }
    const labels = data.map(d => { const p = (d.time_slot||'').split(':'); return `${p[0]||''}:${p[1]||''}`; });
    if (charts.entity) charts.entity.destroy();
    charts.entity = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Forecast', data: data.map(d => d.forecast_wait), borderColor: '#5ab4cc', backgroundColor: 'rgba(90,180,204,.06)', fill: true,  tension: .3, pointRadius: 0, borderWidth: 2 },
                { label: 'Actual',   data: data.map(d => d.actual_wait),   borderColor: '#c9a227', backgroundColor: 'transparent',           fill: false, tension: .3, pointRadius: 0, borderWidth: 2 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { labels: { color: 'rgba(233,244,255,.55)', font: { size: 10, family: 'Inter' } } },
                tooltip: { backgroundColor: 'rgba(8,15,30,.96)', borderColor: 'rgba(90,180,204,.28)', borderWidth: 1, titleColor: '#5ab4cc', bodyColor: '#e9f4ff', callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(0):'\u2014'} min` } }
            },
            scales: {
                x: { ticks: { color: 'rgba(233,244,255,.3)', font: { size: 9 }, maxTicksLimit: 10 }, grid: { color: 'rgba(90,180,204,.05)' } },
                y: { ticks: { color: 'rgba(233,244,255,.3)', font: { size: 9 } }, grid: { color: 'rgba(90,180,204,.05)' }, title: { display: true, text: 'Wait (min)', color: 'rgba(233,244,255,.3)', font: { size: 9 } } }
            }
        }
    });
    let ae = 0, se = 0, n = 0;
    data.forEach(d => { if (d.actual_wait != null && d.forecast_wait != null) { ae += Math.abs(d.forecast_wait - d.actual_wait); se += (d.forecast_wait - d.actual_wait); n++; } });
    document.getElementById('expMAE').textContent   = n ? (ae/n).toFixed(1) : '\u2014';
    document.getElementById('expBias').textContent  = n ? ((se/n>0?'+':'')+(se/n).toFixed(1)) : '\u2014';
    document.getElementById('expSlots').textContent = n || '\u2014';
}

function clearEntityChart() {
    if (charts.entity) { charts.entity.destroy(); charts.entity = null; }
    ['expMAE','expBias','expSlots'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = '\u2014'; });
}

function sortSb(col) {
    if (sortState.col === col) sortState.asc = !sortState.asc;
    else { sortState.col = col; sortState.asc = ['avg_mae','avg_bias','n_days'].includes(col); }
    renderScoreboard();
}

function renderScoreboard() {
    const body = document.getElementById('sb-body');
    const srch = (document.getElementById('sb-search')?.value || '').toLowerCase();
    if (!body || !D.scores) return;
    let rows = D.scores.filter(e =>
        !srch || e.entity_code.toLowerCase().includes(srch) ||
        e.name.toLowerCase().includes(srch) || e.park.toLowerCase().includes(srch));
    rows.sort((a,b) => {
        let va = a[sortState.col], vb = b[sortState.col];
        if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
        return sortState.asc ? (va>vb?1:-1) : (va<vb?1:-1);
    });
    body.innerHTML = rows.map(e => {
        const mae = e.avg_mae.toFixed(1);
        const biasFmt = (e.avg_bias > 0 ? '+' : '') + e.avg_bias.toFixed(1);
        const biasClr = Math.abs(e.avg_bias) < 3 ? 'var(--cyan)' : 'var(--gold)';
        return `<tr onclick="pickEntity('${he(e.entity_code)}')">
            <td class="c-f" style="width:54px">${he(e.entity_code)}</td>
            <td>${he(e.name)}</td>
            <td><span class="ptag ${parkCls(e.park)}">${he(shortPark(e.park))}</span></td>
            <td class="num c-c">${mae}</td>
            <td class="num" style="color:${biasClr}">${biasFmt}</td>
            <td class="num c-f">${e.n_days}</td>
        </tr>`;
    }).join('');
    document.querySelectorAll('#sb-table th').forEach(th => {
        const c = th.dataset.col, sa = th.querySelector('.sa');
        th.classList.toggle('sorted', c === sortState.col);
        if (sa) sa.innerHTML = c === sortState.col ? (sortState.asc ? '&#x2191;' : '&#x2193;') : '&uarr;&darr;';
    });
}

function pickEntity(code) {
    const sel = document.getElementById('entitySel');
    if (!sel) return;
    sel.value = code;
    onEntityChange();
    sel.closest('.card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderParkBars() {
    const el = document.getElementById('park-bars');
    if (!el || !D.scores) return;
    const pd = {};
    D.scores.forEach(e => { if (!pd[e.park]) pd[e.park] = { sum: 0, n: 0 }; pd[e.park].sum += e.avg_mae; pd[e.park].n++; });
    const parks = Object.entries(pd).map(([name, d]) => ({ name, mae: d.sum/d.n, n: d.n })).sort((a,b) => a.mae - b.mae);
    const max = Math.max(...parks.map(p => p.mae));
    const clrs = { 'Magic Kingdom':'#818cf8','EPCOT':'#a78bfa','Hollywood Studios':'#f472b6','Animal Kingdom':'#4ade80','Disneyland':'#38bdf8','DCA':'#5ab4cc','Islands of Adventure':'#2dd4bf','Epic Universe':'#fb923c','Tokyo Disneyland':'#e879f9','Tokyo DisneySea':'#c084fc' };
    el.innerHTML = parks.map(p => `
    <div class="pbar-row">
        <div class="pbar-name">${he(shortPark(p.name))} <span class="c-f" style="font-size:10px">(${p.n})</span></div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${(p.mae/max*100).toFixed(0)}%;background:${clrs[p.name]||'#8892b0'}"></div></div>
        <div class="pbar-val">${p.mae.toFixed(1)}</div>
    </div>`).join('');
}

    const byCol    = {};
    all.forEach(t => { byCol[t.column] = (byCol[t.column]||0)+1; });
    const blkCount = all.filter(t => t.status === 'blocked').length;

    document.getElementById('projects').innerHTML = `
<div class="st">Projects (${projs.length})</div>
<div class="g-auto mb24">
    ${projs.map(p => `
    <div class="proj-card">
        <div class="fb"><div class="proj-name">${he(p.name)}</div>${badge(p.status)}</div>
        <div class="proj-desc">${he(p.description)}</div>
        <div class="fb" style="font-size:10px;color:var(--text-faint)">
            <span>Owner: <strong style="color:var(--text-dim)">${he(p.owner)}</strong></span>
            <span>${p.tasks_done}/${p.tasks_total} tasks</span>
        </div>
        <div class="prog"><div class="prog-f" style="width:${p.pct_complete}%"></div></div>
        <div class="fb" style="font-size:10px;color:var(--text-faint);margin-top:2px">
            ${badge(p.priority)}
            <span class="proj-pct" style="font-size:15px">${p.pct_complete}%</span>
            <span>Updated ${he(p.updated)}</span>
        </div>
    </div>`).join('')}
</div>

<div class="st">Task Board</div>
<div class="stat-grid mb14" style="grid-template-columns:repeat(auto-fill,minmax(108px,1fr))">
    <div class="sbox"><div class="sval">${all.length}</div><div class="slbl">Total</div></div>
    <div class="sbox"><div class="sval">${byCol.done||0}</div><div class="slbl">Done</div></div>
    <div class="sbox"><div class="sval">${byCol.backlog||0}</div><div class="slbl">Backlog</div></div>
    <div class="sbox"><div class="sval">${byCol.recurring||0}</div><div class="slbl">Recurring</div></div>
    <div class="sbox"><div class="sval">${byCol.review||0}</div><div class="slbl">Review</div></div>
    <div class="sbox"><div class="sval">${blkCount}</div><div class="slbl">Blocked</div></div>
</div>

<div class="fbar" id="task-fbar">
    <button class="fchip active" data-f="all">All (${all.length})</button>
    <button class="fchip" data-f="backlog">Backlog (${byCol.backlog||0})</button>
    <button class="fchip" data-f="done">Done (${byCol.done||0})</button>
    <button class="fchip" data-f="recurring">Recurring (${byCol.recurring||0})</button>
    <button class="fchip" data-f="review">Review (${byCol.review||0})</button>
    <button class="fchip" data-f="blocked">Blocked (${blkCount})</button>
</div>
<div id="task-list" style="display:flex;flex-direction:column;gap:6px">${buildTaskList(all,'all')}</div>`;

    document.getElementById('task-fbar').addEventListener('click', ev => {
        const ch = ev.target.closest('.fchip');
        if (!ch) return;
        document.querySelectorAll('#task-fbar .fchip').forEach(c => c.classList.remove('active'));
        ch.classList.add('active');
        document.getElementById('task-list').innerHTML = buildTaskList(all, ch.dataset.f);
    });
}

function buildTaskList(tasks, filter) {
    let list = tasks;
    if (filter !== 'all') {
        if (filter === 'blocked') list = tasks.filter(t => t.status === 'blocked');
        else list = tasks.filter(t => t.column === filter);
    }
    if (!list.length) return '<div class="loading">No tasks in this column.</div>';
    return list.map(t => `
    <div class="task-item">
        <div class="fb">
            <span class="task-title">${he(t.title)}</span>
            <div style="display:flex;gap:5px;align-items:center;flex-shrink:0;margin-left:8px">
                ${badge(t.priority)} ${badge(t.column||t.status)}
                <span style="font-family:var(--mono);font-size:10px;color:var(--text-faint)">${he(t.owner)}</span>
            </div>
        </div>
        ${t.notes ? `<div class="task-notes">${he(trunc(t.notes, 220))}</div>` : ''}
        <div class="task-foot">
            <span class="tag">${he(t.project)}</span>
            ${t.updated ? '<span>Updated ' + fmtDate(t.updated) + '</span>' : ''}
            ${t.is_recurring ? badge('Recurring','recurring') : ''}
        </div>
    </div>`).join('');
}

/* ════════════════════════════════════════════════════════
   INTEL
   ════════════════════════════════════════════════════════ */
function renderIntel() {
    const comp = D.comp || {};
    const disc = D.disc || {};
    const cats = comp.categories || {};
    const sections = [
        { key: 'touringplans',    label: 'TouringPlans' },
        { key: 'theme_park_news', label: 'Park News'    },
        { key: 'reddit',          label: 'Reddit'       },
        { key: 'hazeydata_mentions', label: 'HazeyData' },
    ];
    const discAct = disc.recent_activity || [];

    document.getElementById('intel').innerHTML = `
<div class="g2">
    <div>
        <div class="st">Competitor Watch &mdash; ${he(comp.date||'')}</div>
        <div class="itabs" id="itab-nav">
            ${sections.map((s,i) => {
                const cnt = cats[s.key]?.count || 0;
                return `<button class="itab${i===0?' active':''}" data-p="ip-${s.key}">${he(s.label)} (${cnt})</button>`;
            }).join('')}
        </div>
        ${sections.map((s,i) => {
            const items = (cats[s.key]?.items||[]).filter(it => it.relevant !== false).slice(0, 20);
            return `<div class="ipanel${i===0?' active':''}" id="ip-${s.key}">
                ${items.length
                    ? items.map(it => `
                    <div class="intel-item">
                        <div class="intel-title">${it.url?`<a href="${he(it.url)}" target="_blank" rel="noopener">${he(it.title)}</a>`:he(it.title)}</div>
                        ${it.snippet?`<div class="intel-snip">${he(trunc(it.snippet,200))}</div>`:''}
                        <div class="intel-meta">
                            <span>${he(it.source||'')}</span>
                            ${it.published?`<span>${he(it.published)}</span>`:''}
                            ${it.score!=null?`<span>&uarr;${it.score} &middot; &#x1F4AC;${it.comments}</span>`:''}
                        </div>
                    </div>`).join('')
                    : '<div class="loading">No items.</div>'}
            </div>`;
        }).join('')}
    </div>
    <div>
        <div class="st">Discord Feed &mdash; ${disc.stats?.messages_today||0} msgs today</div>
        <div class="card" style="padding:0;overflow:hidden">
            ${discAct.map(m => `
            <div class="dc-item">
                <div class="dc-hdr">
                    <span class="dc-chan">${he(m.channel_emoji||'')} #${he(m.channel)}</span>
                    <span class="dc-agent">${m.is_bot?'&#x1F916;':'&#x1F464;'} ${he(m.agent)}</span>
                    <span class="dc-ts">${relTime(m.timestamp)}</span>
                </div>
                <div class="dc-msg">${he(trunc(m.message,160))}</div>
            </div>`).join('')}
        </div>
    </div>
</div>`;

    document.getElementById('itab-nav').addEventListener('click', ev => {
        const t = ev.target.closest('.itab');
        if (!t) return;
        document.querySelectorAll('#itab-nav .itab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.ipanel').forEach(p => p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById(t.dataset.p).classList.add('active');
    });
}

/* ════════════════════════════════════════════════════════
   IDEAS
   ════════════════════════════════════════════════════════ */
function renderIdeas() {
    const data  = D.ideas || {};
    const ideas = data.ideas   || [];
    const sum   = data.summary || {};
    const ORDER = ['approved','exploring','new','rejected'];
    const LBLS  = { approved:'Approved', exploring:'Exploring', new:'New', rejected:'Rejected' };

    let html = `
<div class="stat-grid mb20" style="grid-template-columns:repeat(auto-fill,minmax(118px,1fr))">
    <div class="sbox"><div class="sval">${sum.total||0}</div><div class="slbl">Total</div></div>
    <div class="sbox"><div class="sval">${sum.approved||0}</div><div class="slbl">Approved</div></div>
    <div class="sbox"><div class="sval">${sum.exploring||0}</div><div class="slbl">Exploring</div></div>
    <div class="sbox"><div class="sval">${sum.new||0}</div><div class="slbl">New</div></div>
    <div class="sbox"><div class="sval">${sum.rejected||0}</div><div class="slbl">Rejected</div></div>
</div>`;

    ORDER.forEach(status => {
        const group = ideas.filter(i => i.status === status);
        if (!group.length) return;
        html += `
<div class="st">${LBLS[status]} (${group.length})</div>
<div class="g-auto mb20">
    ${group.map(idea => `
    <div class="idea-card">
        <div class="fb"><div class="idea-ttl">${he(idea.title)}</div>${badge(idea.status)}</div>
        <div class="idea-desc">${he(idea.description)}</div>
        <div class="idea-foot"><span class="tag">${he(idea.category)}</span><span>${he(idea.owner)}</span><span>${he(idea.created)}</span></div>
    </div>`).join('')}
</div>`;
    });

    document.getElementById('ideas').innerHTML = html;
}
