        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f1d32;
            --bg-card: rgba(255,255,255,0.05);
            --border-card: rgba(255,255,255,0.1);
            --border-accent: rgba(74,144,164,0.3);
            --accent: #4a90a4;
            --accent-light: #6bb5c9;
            --accent-red: #A60038;
            --accent-red-light: #e05577;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --font-text: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            font-family: var(--font-text);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-secondary);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        h1 {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .entity-name { font-size: 0.95rem; color: var(--text-muted); margin-top: 3px; }
        
        .badge {
            background: var(--accent-red);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font-mono);
        }
        
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .chart-wrapper { position: relative; height: 350px; }
        
        @media (min-width: 768px) {
            .chart-wrapper { height: 450px; }
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .legend-color { width: 16px; height: 10px; border-radius: 3px; }
        .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
        
        .predicted-actual { background: linear-gradient(90deg, var(--accent-light), var(--accent)); }
        .posted-dots { background: var(--text-muted); }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }
        
        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .date-info {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
    </style>
</head>

                        padding: 12,
                        callbacks: {
                            title: (items) => new Date(items[0].parsed.x).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }),
                            label: (item) => `${item.dataset.label}: ${Math.round(item.parsed.y)} min`
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'hour', displayFormats: { hour: 'h a' } },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.4)', maxRotation: 0 }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.4)', callback: (v) => v + ' min' }
                    }
                }
            }
        });
    </script>
</body>
</html>
