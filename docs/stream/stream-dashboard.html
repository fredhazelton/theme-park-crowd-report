<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HazeyData Stream Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --navy: #0a1628;
            --navy-light: rgba(10, 22, 40, 0.95);
            --navy-card: rgba(15, 30, 50, 0.9);
            --cyan: #4a90a4;
            --cyan-dim: rgba(74, 144, 164, 0.4);
            --text-primary: #e9f4ff;
            --text-secondary: rgba(233, 244, 255, 0.6);
            --red: #A60038;
            --green: #5ab4cc;
            --orange: #5ab4cc;
            --purple: #4a90a4;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            color: var(--text-primary);
            width: 1540px;
            height: 890px;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 10px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 12px;
            height: 100%;
            position: relative;
            overflow: visible;
        }
        
        /* Sidebar - Filters */
        .sidebar {
            background: var(--navy-card);
            border: 1px solid var(--cyan-dim);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: visible;
            position: relative;
            z-index: 10;
        }
        
        .filter-section { display: flex; flex-direction: column; gap: 4px; }
        .filter-label { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; 
            color: var(--cyan); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-select {
            background: rgba(74, 144, 164, 0.1);
            border: 1px solid var(--cyan-dim);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            position: relative;
            z-index: 20;
        }
        .filter-select:focus { outline: none; border-color: var(--cyan); }
        
        /* Ensure select dropdowns can overflow */
        .filter-section {
            position: relative;
            z-index: 15;
        }
        
        .date-presets { display: flex; gap: 4px; flex-wrap: wrap; }
        .date-preset {
            flex: 1;
            min-width: calc(25% - 3px);
            padding: 4px;
            background: rgba(74, 144, 164, 0.1);
            border: 1px solid var(--cyan-dim);
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .date-preset.active {
            background: var(--cyan);
            color: var(--navy);
            border-color: var(--cyan);
        }
        .date-calendar-wrapper {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .date-calendar-arrow {
            width: 24px;
            height: 24px;
            padding: 0;
            background: rgba(74, 144, 164, 0.1);
            border: 1px solid var(--cyan-dim);
            color: var(--text-primary);
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .date-calendar-arrow:hover {
            background: rgba(74, 144, 164, 0.2);
            border-color: var(--cyan);
        }
        .date-calendar-arrow:active {
            background: var(--cyan);
            color: var(--navy);
        }
        .date-today-btn {
            margin-top: 4px;
            width: 100%;
            height: 22px;
            padding: 0 8px;
            background: rgba(74, 144, 164, 0.1);
            border: 1px solid var(--cyan-dim);
            color: var(--text-secondary);
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .date-today-btn:hover {
            background: rgba(74, 144, 164, 0.2);
            border-color: var(--cyan);
            color: var(--text-primary);
        }
        .date-today-btn:active {
            background: var(--cyan);
            color: var(--navy);
        }
        .date-calendar-input {
            flex: 1;
            padding: 4px 8px;
            background: rgba(74, 144, 164, 0.1);
            border: 1px solid var(--cyan-dim);
            color: var(--text-primary);
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .date-calendar-input:focus {
            outline: none;
            border-color: var(--cyan);
        }
        .date-calendar-input::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.8);
        }
        
        .filter-divider {
            height: 1px;
            background: var(--cyan-dim);
            margin: 4px 0;
        }
        
        .clear-filters-btn {
            width: 100%;
            padding: 8px 10px;
            background: rgba(74, 144, 164, 0.15);
            border: 1px solid var(--cyan-dim);
            color: var(--cyan);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .clear-filters-btn:hover {
            background: rgba(74, 144, 164, 0.25);
            border-color: var(--cyan);
        }
        .clear-filters-btn:active {
            background: var(--cyan);
            color: var(--navy);
        }
        
        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* KPI Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .kpi-card {
            background: var(--navy-card);
            border: 1px solid var(--cyan-dim);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        .kpi-label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 24px; font-weight: 700; color: var(--cyan); margin: 4px 0; }
        .kpi-value.red { color: var(--cyan); }
        .kpi-value.green { color: var(--green); }
        .kpi-value.orange { color: var(--orange); }
        .kpi-value.purple { color: var(--purple); }
        .kpi-value.wti { 
            font-size: 24px; 
            font-weight: 700; 
            color: var(--red); 
            margin: 4px 0; 
        }
        .kpi-subtext { font-size: 9px; color: var(--text-secondary); }
        
        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            flex: 1;
        }
        .charts-row-2 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            flex: 1;
        }
        .chart-panel {
            background: var(--navy-card);
            border: 1px solid var(--cyan-dim);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .chart-header { margin-bottom: 8px; }
        .chart-title { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px; 
            font-weight: 600;
            color: var(--cyan); 
        }
        .chart-subtitle { font-size: 12px; color: var(--text-secondary); }
        .chart-container { flex: 1; position: relative; min-height: 150px; }
        
        /* Top Waits List */
        .top-list { flex: 1; overflow-y: auto; }
        .top-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(74,144,164,0.1);
            font-size: 10px;
        }
        .top-item .rank { color: var(--cyan); width: 20px; }
        .top-item .name { flex: 1; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top-item .wait { color: var(--orange); font-weight: 600; }
        
        .loading { color: var(--text-secondary); font-size: 11px; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <button type="button" class="clear-filters-btn" id="clear-all-filters" title="Reset to: All Properties, All Parks, All Attractions, Today, Actual Wait">Clear all filters</button>
            <div class="filter-section">
                <label class="filter-label">Property</label>
                <select class="filter-select" id="property-filter" title="Select property → then park → then attraction (hierarchy)">
                    <option value="all">All Properties</option>
                    <!-- Populated from API -->
                </select>
            </div>
            
            <div class="filter-section">
                <label class="filter-label">Park</label>
                <select class="filter-select" id="park-filter">
                    <option value="all">All Parks</option>
                    <!-- Populated from API -->
                </select>
            </div>
            
            <div class="filter-section">
                <label class="filter-label">Attraction</label>
                <select class="filter-select" id="attraction-filter">
                    <option value="all">All Attractions</option>
                </select>
            </div>
            
            <div class="filter-divider"></div>
            
            <div class="filter-section">
                <label class="filter-label">Date Range</label>
                <div class="date-presets">
                    <button class="date-preset" data-range="7">7D</button>
                    <button class="date-preset" data-range="30">30D</button>
                    <button class="date-preset" data-range="90">90D</button>
                    <button class="date-preset" data-range="365">1Y</button>
                </div>
                <div class="date-calendar-wrapper">
                    <button class="date-calendar-arrow" id="date-arrow-left" title="Previous day">←</button>
                    <input type="date" class="date-calendar-input" id="date-calendar-picker" />
                    <button class="date-calendar-arrow" id="date-arrow-right" title="Next day">→</button>
                </div>
                <button class="date-today-btn" id="date-today-btn" title="Jump to today">⊙ Today</button>
            </div>
            
            <div class="filter-section">
                <label class="filter-label">Wait Type</label>
                <select class="filter-select" id="wait-type-filter">
                    <option value="actual" selected>Actual Wait</option>
                    <option value="posted">Posted Wait</option>
                </select>
            </div>
            
            <div class="filter-divider"></div>
            
            <div class="filter-section">
                <label class="filter-label">Data</label>
                <div id="data-info" style="font-size: 9px; color: var(--text-secondary);">Loading...</div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="kpi-row">
                <div class="kpi-card" id="kpi-avg-card">
                    <div class="kpi-label" id="kpi-avg-label">Avg Wait</div>
                    <div class="kpi-value" id="kpi-avg">--</div>
                    <div class="kpi-subtext" id="kpi-avg-subtext">minutes</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Peak</div>
                    <div class="kpi-value red" id="kpi-max">--</div>
                    <div class="kpi-subtext">max actual</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Min</div>
                    <div class="kpi-value green" id="kpi-min">--</div>
                    <div class="kpi-subtext">min actual</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label" id="kpi-readings-label">Data Points</div>
                    <div class="kpi-value orange" id="kpi-readings">--</div>
                    <div class="kpi-subtext" id="kpi-readings-subtext">readings</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label" id="kpi-days-label">Days</div>
                    <div class="kpi-value purple" id="kpi-days">--</div>
                    <div class="kpi-subtext" id="kpi-days-subtext">in range</div>
                </div>
            </div>
            
            <div class="charts-row">
                <div class="chart-panel">
                    <div class="chart-header">
                        <div class="chart-title">Daily Wait Time Curve</div>
                        <div class="chart-subtitle" id="chart1-subtitle">Avg actual wait every 5 min</div>
<!-- example hint removed -->
                    </div>
                    <div class="chart-container">
                        <canvas id="timeSeriesChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-panel">
                    <div class="chart-header">
                        <div class="chart-title">Top 10 Longest Waits</div>
                        <div class="chart-subtitle">Average posted wait</div>
                    </div>
                    <div class="top-list" id="top-waits-list">
                        <div class="loading">Loading...</div>
                    </div>
                </div>
            </div>
            
            <div class="charts-row-2">
                <div class="chart-panel">
                    <div class="chart-header">
                        <div class="chart-title">Wait Time Index</div>
                        <div class="chart-subtitle">Average wait times</div>
                    </div>
                    <div class="chart-container">
                        <canvas id="parkCompareChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-panel">
                    <div class="chart-header">
                        <div class="chart-title">Day of Week</div>
                        <div class="chart-subtitle">Weekly pattern</div>
                    </div>
                    <div class="chart-container">
                        <canvas id="weekdayChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // API: use localhost when running API locally (python3 dashboard/api.py); use wilma-server when API runs there
        // Auto-detect: use current hostname so it works from any machine on the LAN
        const API_BASE = `http://${window.location.hostname}:8051/api`;
        // One-off: use hardcoded fake curve + actual points for visual tinkering (set to false to use real API)
        const USE_FAKE_CURVE_DATA = false;
        console.log('API Base URL:', API_BASE);
        
        let dashboardData = null;
        let charts = {};
        
        /** Get the selected date string (YYYY-MM-DD) from the date picker, or today if empty. */
        function getSelectedDateStr() {
            const dateInput = document.getElementById('date-calendar-picker');
            if (dateInput && dateInput.value) return dateInput.value;
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        }

        async function loadData() {
            try {
                const park = document.getElementById('park-filter').value;
                const selectedDate = getSelectedDateStr();

                // When no park is selected, show aggregate KPIs across all parks
                if (park === 'all') {
                    // Fetch WTI for all parks to compute aggregate stats
                    const dateParams = getDateQueryParams();
                    try {
                        const parksRes = await fetch(`${API_BASE}/parks`);
                        const parksData = parksRes.ok ? await parksRes.json() : { parks: [] };
                        const allParks = (parksData.parks || []).map(p => p.code || p.park_code).filter(Boolean);
                        
                        const allStats = await Promise.all(
                            allParks.map(async (p) => {
                                try {
                                    const r = await fetch(`${API_BASE}/stats/${p}?${dateParams}`);
                                    return r.ok ? await r.json() : null;
                                } catch { return null; }
                            })
                        );
                        const validStats = allStats.filter(s => s && s.wti != null);
                        
                        if (validStats.length > 0) {
                            const wtiValues = validStats.map(s => s.wti);
                            const avg = wtiValues.reduce((a, b) => a + b, 0) / wtiValues.length;
                            document.getElementById('kpi-avg').textContent = Math.round(avg);
                            document.getElementById('kpi-max').textContent = Math.round(Math.max(...wtiValues));
                            document.getElementById('kpi-min').textContent = Math.round(Math.min(...wtiValues));
                        } else {
                            document.getElementById('kpi-avg').textContent = '--';
                            document.getElementById('kpi-max').textContent = '--';
                            document.getElementById('kpi-min').textContent = '--';
                        }
                        document.getElementById('kpi-readings-label').textContent = 'Parks';
                        document.getElementById('kpi-readings').textContent = validStats.length;
                        document.getElementById('kpi-readings-subtext').textContent = 'with data';
                        document.getElementById('kpi-days-label').textContent = 'Date';
                        document.getElementById('kpi-days').textContent = selectedDate.slice(5); // MM-DD
                        document.getElementById('kpi-days-subtext').textContent = selectedDate.slice(0, 4);
                    } catch (e) {
                        console.warn('Aggregate KPI load failed:', e);
                    }
                    document.getElementById('data-info').innerHTML = 'Date: ' + selectedDate + '<br>Showing all parks';
                    const topList = document.getElementById('top-waits-list');
                    if (topList) topList.innerHTML = '<div class="loading">Select a park for top waits</div>';
                    dashboardData = {};
                    await loadDailyCurve();
                    fetchSampleCurveExample();
                    return;
                }
                const parkCode = park;
                
                // Fetch data from API — pass date/range to stats so it responds to slicer
                const dateParams = getDateQueryParams();
                const [statsRes, waitTimesRes] = await Promise.all([
                    fetch(`${API_BASE}/stats/${parkCode}?${dateParams}`).catch(() => null),
                    fetch(`${API_BASE}/wait-times/${parkCode}?limit=20`).catch(() => null)
                ]);
                
                if (!statsRes || !waitTimesRes) {
                    throw new Error('API not available. Make sure the API is running on port 8051.');
                }
                
                const stats = await statsRes.json();
                const waitTimes = await waitTimesRes.json();
                
                // Transform API data to dashboard format
                const waits = waitTimes.wait_times || [];
                const waitValues = waits.map(w => w.wait_minutes).filter(w => w != null && w > 0);
                
                // Update KPIs — prefer WTI from stats when a park is selected
                const isParkSelected = park !== 'all';
                if (isParkSelected && stats.wti != null) {
                    document.getElementById('kpi-avg').textContent = Math.round(stats.wti);
                } else if (waitValues.length > 0) {
                    const avg = waitValues.reduce((a, b) => a + b, 0) / waitValues.length;
                    document.getElementById('kpi-avg').textContent = Math.round(avg);
                } else {
                    document.getElementById('kpi-avg').textContent = '--';
                }

                if (waitValues.length > 0) {
                    document.getElementById('kpi-max').textContent = Math.round(Math.max(...waitValues));
                    document.getElementById('kpi-min').textContent = Math.round(Math.min(...waitValues));
                } else {
                    document.getElementById('kpi-max').textContent = '--';
                    document.getElementById('kpi-min').textContent = '--';
                }

                // KPI cards 4 & 5: show Open/Close when a park is selected
                if (isParkSelected && stats.open_time) {
                    // Format time for display (e.g., "09:00" → "9 AM")
                    function fmtTime(hhmm) {
                        if (!hhmm) return '--';
                        const [h, m] = hhmm.split(':').map(Number);
                        const suffix = h >= 12 ? 'PM' : 'AM';
                        const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
                        return m === 0 ? `${h12} ${suffix}` : `${h12}:${String(m).padStart(2,'0')} ${suffix}`;
                    }
                    const hoursLabel = stats.hours_source === 'official' ? 'official' : 'expected';
                    document.getElementById('kpi-readings-label').textContent = 'Opens';
                    document.getElementById('kpi-readings').textContent = fmtTime(stats.open_time);
                    document.getElementById('kpi-readings-subtext').textContent = hoursLabel;
                    document.getElementById('kpi-days-label').textContent = 'Closes';
                    document.getElementById('kpi-days').textContent = fmtTime(stats.close_time);
                    document.getElementById('kpi-days-subtext').textContent = hoursLabel;
                } else {
                    document.getElementById('kpi-readings-label').textContent = 'Data Points';
                    document.getElementById('kpi-readings').textContent = waitValues.length > 0 ? waitValues.length.toLocaleString() : '--';
                    document.getElementById('kpi-readings-subtext').textContent = 'readings';
                    document.getElementById('kpi-days-label').textContent = 'Days';
                    document.getElementById('kpi-days').textContent = '--';
                    document.getElementById('kpi-days-subtext').textContent = 'in range';
                }
                
                // Update data info
                document.getElementById('data-info').innerHTML = 
                    'Date: ' + selectedDate + '<br>' +
                    'Readings: ' + (waitValues.length || 0) + '<br>' +
                    (stats.best_time ? 'Best time: ' + stats.best_time : '');
                
                // Update top waits list
                updateTopWaitsListFromAPI(waits);
                
                // Store data for charts
                dashboardData = {
                    wait_times: waits,
                    stats: stats
                };
                
                // Load daily wait time curve (area chart)
                await loadDailyCurve();
                // Fetch example (park, attraction, date) with real actual data for the curve hint
                fetchSampleCurveExample();
            } catch (e) {
                document.getElementById('data-info').textContent = 'Error loading data: ' + e.message;
                console.error(e);
                // Still load daily curve chart (empty or from API if it's reachable)
                await loadDailyCurve();
            }
        }
        
        function getFallbackEntitiesForPark(park) {
            const fallbacks = {
                mk: [
                    { entity_code: 'MK01', entity_name: 'Space Mountain' },
                    { entity_code: 'MK05', entity_name: 'Big Thunder Mountain' },
                    { entity_code: 'MK23', entity_name: 'Haunted Mansion' },
                    { entity_code: 'MK96', entity_name: 'Seven Dwarfs Mine Train' },
                    { entity_code: 'MK191', entity_name: 'TRON Lightcycle / Run' }
                ],
                ep: [
                    { entity_code: 'EP01', entity_name: 'Spaceship Earth' },
                    { entity_code: 'EP02', entity_name: 'Test Track' },
                    { entity_code: 'EP08', entity_name: "Soarin'" }
                ],
                hs: [
                    { entity_code: 'HS01', entity_name: 'Tower of Terror' },
                    { entity_code: 'HS02', entity_name: "Rock 'n' Roller Coaster" }
                ],
                ak: [
                    { entity_code: 'AK01', entity_name: 'Kilimanjaro Safaris' },
                    { entity_code: 'AK03', entity_name: 'Expedition Everest' }
                ]
            };
            return fallbacks[park] || fallbacks.mk;
        }

        async function populateAttractions() {
            const select = document.getElementById('attraction-filter');
            const park = document.getElementById('park-filter').value;
            select.innerHTML = '<option value="all">All Attractions</option>';
            
            if (park === 'all') {
                return;
            }
            
            try {
                // Use the park code directly - API will map it to pipeline codes internally
                const url = `${API_BASE}/entities/${park}`;
                console.log('Fetching attractions from:', url);
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Failed to fetch entities: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Entities API response:', result);
                const entities = result.entities || [];
                
                if (entities.length === 0) {
                    console.warn('No entities returned from API for park:', park, '- using fallback list');
                    entities = getFallbackEntitiesForPark(park);
                }
                
                // Debug: Log first few entities to see what we're getting
                console.log('First 3 entities from API:', entities.slice(0, 3));
                
                // Populate dropdown with entities from entity table
                // Always use entity_name for display (full name), entity_code for value
                entities.forEach(entity => {
                    const opt = document.createElement('option');
                    // Use entity_name for display, entity_code as the value
                    const displayName = entity.entity_name || entity.name || entity.entity_code;

        // Park day: 06:00 (6 AM) to 03:00 next day — X-axis origin is 6 AM, not midnight
        function parkDaySort(a, b) {
            const aLate = a < '06:00';
            const bLate = b < '06:00';
            if (aLate !== bLate) return aLate ? 1 : -1;
            return a.localeCompare(b);
        }
        function sortCurveByParkDay(curve) {
            return curve.slice().sort((a, b) => parkDaySort(a.time_slot, b.time_slot));
        }

        function buildPlaceholderCurve() {
            // Park day: 06:00 to 23:55, then 00:00 to 02:55 (6 AM to 3 AM next day)
            const slots = [];
            const values = [];
            function addSlots(startH, endH) {
                for (let h = startH; h <= endH; h++) {
                    for (let m = 0; m < 60; m += 5) {
                        const time_slot = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                        slots.push(time_slot);
                        const minutesFrom6 = h >= 6 ? (h - 6) * 60 + m : (h + 18) * 60 + m;
                        const peakMin = 6 * 60;
                        const wait = Math.round(8 + 22 * Math.exp(-Math.pow((minutesFrom6 - peakMin) / 120, 2)) + (minutesFrom6 / 720) * 4);
                        values.push(Math.min(55, Math.max(5, wait)));
                    }
                }
            }
            addSlots(6, 23);
            addSlots(0, 2);
            return slots.map((time_slot, i) => ({ time_slot, avg_wait: values[i] }));
        }

        function buildCurveFromActualPoints(actualPoints) {
            const pointBySlot = {};
            actualPoints.forEach(p => {
                const t = p.time_slot;
                if (!pointBySlot[t]) pointBySlot[t] = [];
                pointBySlot[t].push(p.wait_time_minutes);
            });
            const slots = Object.keys(pointBySlot).sort((a, b) => parkDaySort(a, b));
            return slots.map(ts => ({
                time_slot: ts,
                avg_wait: pointBySlot[ts].reduce((s, v) => s + v, 0) / pointBySlot[ts].length
            }));
        }

        function updateTimeSeriesChart(curveData) {
            const ctx = document.getElementById('timeSeriesChart').getContext('2d');
            if (charts.timeSeries) charts.timeSeries.destroy();
            let curve = curveData && curveData.curve ? curveData.curve : [];
            const isPlaceholder = curve.length === 0;
            if (curve.length === 0) {
                curve = buildPlaceholderCurve();
            } else {
                curve = sortCurveByParkDay(curve);
            }
            const labels = curve.map(p => p.time_slot);
            const values = curve.map(p => p.avg_wait);
            const allValues = values.filter(v => v != null && v > 0);
            const yMax = allValues.length ? Math.max(60, Math.ceil(Math.max(...allValues) * 1.15 / 10) * 10) : 60;
            // Update Peak and Min KPIs from the actual curve data
            if (allValues.length > 0) {
                const curvePeak = Math.round(Math.max(...allValues));
                const curveMin = Math.round(Math.min(...allValues));
                document.getElementById('kpi-max').textContent = curvePeak;
                document.getElementById('kpi-min').textContent = curveMin;
            }
            const datasets = [{
                label: isPlaceholder ? 'Placeholder (min)' : 'Avg actual wait (min)',
                data: values,
                borderColor: isPlaceholder ? 'rgba(74, 144, 164, 0.5)' : '#4a90a4',
                backgroundColor: isPlaceholder ? 'rgba(74, 144, 164, 0.15)' : 'rgba(74, 144, 164, 0.25)',
                fill: true,
                tension: 0.3,
                pointRadius: values.length > 40 ? 0 : 2,
                pointBackgroundColor: '#4a90a4',
                pointBorderColor: '#4a90a4'
            }];
            // ── Smart label picker: peaks, valleys, and periodic labels ──
            function pickLabelIndices(values) {
                if (!values || values.length < 3) return [];
                const n = values.length;
                const selected = new Set();
                const MIN_GAP = Math.max(6, Math.floor(n / 15)); // min indices apart

                // Find local peaks and valleys (using a window of 5 on each side)
                const window = 5;
                const scored = [];
                for (let i = window; i < n - window; i++) {
                    if (values[i] == null) continue;
                    const neighbors = values.slice(Math.max(0, i - window), i + window + 1).filter(v => v != null);
                    const avg = neighbors.reduce((a, b) => a + b, 0) / neighbors.length;
                    const diff = Math.abs(values[i] - avg);
                    const isPeak = neighbors.every(v => values[i] >= v);
                    const isValley = neighbors.every(v => values[i] <= v);
                    if (isPeak || isValley) {
                        scored.push({ idx: i, score: diff, type: isPeak ? 'peak' : 'valley' });
                    }
                }
                // Sort by prominence (biggest diff first)
                scored.sort((a, b) => b.score - a.score);

                // Add global max and min first
                let globalMax = 0, globalMin = 0;
                for (let i = 0; i < n; i++) {
                    if (values[i] != null) {
                        if (values[i] > (values[globalMax] || 0)) globalMax = i;
                        if (values[i] < (values[globalMin] || Infinity)) globalMin = i;
                    }
                }
                selected.add(globalMax);
                if (Math.abs(globalMin - globalMax) >= MIN_GAP) selected.add(globalMin);

                // Add prominent peaks/valleys respecting MIN_GAP
                for (const item of scored) {
                    let tooClose = false;
                    for (const existing of selected) {
                        if (Math.abs(item.idx - existing) < MIN_GAP) { tooClose = true; break; }
                    }
                    if (!tooClose) selected.add(item.idx);
                    if (selected.size >= 8) break; // cap extremes
                }

                // Fill periodic labels in remaining gaps
                const sortedSelected = Array.from(selected).sort((a, b) => a - b);
                const PERIODIC_GAP = Math.max(12, Math.floor(n / 6));
                // Walk the curve and add labels where there are big gaps
                for (let i = 0; i < n; i += PERIODIC_GAP) {
                    if (values[i] == null) continue;
                    let tooClose = false;
                    for (const existing of selected) {
                        if (Math.abs(i - existing) < MIN_GAP) { tooClose = true; break; }
                    }
                    if (!tooClose) selected.add(i);
                }

                return selected;
            }

            const labelIndices = pickLabelIndices(values);

            charts.timeSeries = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            display: true,
                            grid: { display: false },
                            border: { display: false },
                            ticks: { color: '#6a7a8a', font: { size: 9 }, maxTicksLimit: 20 }
                        },
                        y: {
                            display: true,
                            min: 0,
                            max: yMax,
                            grid: { display: false },
                            border: { display: false },
                            ticks: { display: false }
                        }
                    }
                },
                plugins: [{
                    id: 'curveDataLabels',
                    afterDatasetsDraw(chart) {
                        const ctx = chart.ctx;
                        const meta = chart.getDatasetMeta(0);
                        if (!meta || !meta.data) return;
                        ctx.save();
                        ctx.font = 'bold 14px Inter, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        meta.data.forEach((point, i) => {
                            if (!labelIndices.has(i)) return;
                            const val = values[i];
                            if (val == null) return;
                            const x = point.x;
                            const y = point.y;
                            const offsetY = y < 40 ? 22 : -18;
                            const textY = y + offsetY;
                            const text = String(Math.round(val));
                            const textW = ctx.measureText(text).width;
                            const padX = 6, padY = 4;
                            // Semi-transparent background pill
                            ctx.fillStyle = 'rgba(10, 22, 40, 0.5)';
                            const rx = 4; // border radius
                            const bx = x - textW / 2 - padX;
                            const by = textY - 7 - padY;
                            const bw = textW + padX * 2;
                            const bh = 14 + padY * 2;
                            ctx.beginPath();
                            ctx.roundRect(bx, by, bw, bh, rx);
                            ctx.fill();
                            // Label text
                            ctx.fillStyle = '#e9f4ff';
                            ctx.fillText(text, x, textY);
                        });
                        ctx.restore();
                    }
                }]
            });
            const sub = document.getElementById('chart1-subtitle');
            const entityLabel = (curveData && curveData.entity_code) ? ' · ' + curveData.entity_code : '';
            if (curveData && curveData._noPark) {
                sub.textContent = 'Select a park to see the daily wait time curve';
            } else if (isPlaceholder) {
                sub.textContent = 'No curve data for this park/date';
            } else if (curveData && curveData.start_date && curveData.end_date) {
                const today = new Date().toISOString().slice(0, 10);
                const isForecast = curveData.start_date > today;
                const label = isForecast ? 'Forecast avg wait' : 'Avg actual wait every 5 min';
                let text = (curveData.start_date === curveData.end_date
                    ? label + ' · ' + curveData.start_date
                    : label + ' · ' + curveData.start_date + ' – ' + curveData.end_date) + entityLabel;
                sub.textContent = text;
            } else {
                sub.textContent = 'Avg actual wait every 5 min' + entityLabel;
            }
        }

        /** Build URL query params string for the current date selection (single date or range). */

            return 'start=' + encodeURIComponent(range.start) + '&end=' + encodeURIComponent(range.end);

        function getDateRangeForCurve() {
            const dateInput = document.getElementById('date-calendar-picker');
            const activePreset = document.querySelector('.date-preset.active');
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`;
            if (activePreset) {
                const n = parseInt(activePreset.dataset.range, 10);
                if (!isNaN(n) && n >= 1) {
                    const end = new Date(today);
                    const start = new Date(today);
                    start.setDate(start.getDate() - (n - 1));
                    return {
                        start: start.toISOString().slice(0, 10),
                        end: end.toISOString().slice(0, 10)
                    };
                }
            }
            const pickerVal = dateInput && dateInput.value ? dateInput.value : todayStr;
            return { date: pickerVal };
        }

            // Build a dataset per park
            let globalMax = 0;

                            grid: { display: false },

        async function loadAllParksCurve() {
            const dateParams = getDateQueryParams();
            const waitType = document.getElementById('wait-type-filter').value || 'actual';
            const property = document.getElementById('property-filter').value;

            try {
                // 1. Get park list
                let parksUrl = property === 'all' ? `${API_BASE}/parks` : `${API_BASE}/parks?property=${encodeURIComponent(property)}`;
                const parksRes = await fetch(parksUrl);
                const parksList = (await parksRes.json()).parks || [];

                // 2. Fetch each park's curve in parallel
                const results = await Promise.all(parksList.map(async (p) => {
                    try {
                        let url = `${API_BASE}/daily-curve/${p.code}?${dateParams}&wait_type=${encodeURIComponent(waitType)}`;
                        const res = await fetch(url);
                        if (!res.ok) return { name: p.name, curve: [] };
                        const data = await res.json();
                        return { name: p.name, curve: data.curve || [] };
                    } catch { return { name: p.name, curve: [] }; }
                }));

                // 3. Filter out parks with no data
                const validResults = results.filter(r => r.curve.length > 0);

                if (validResults.length === 0) {
                    updateTimeSeriesChart({ curve: [] });
                    return;
                }

                // 4. Render multi-line chart
                updateMultiParkChart(
                    validResults.map(r => r.curve),
                    validResults.map(r => r.name)
                );

                console.log(`All-parks multi-line: ${validResults.length} parks with data`);
            } catch (e) {
                console.warn('All-parks curve failed:', e.message || e);
                updateTimeSeriesChart({ curve: [] });
            }
        }

            const park = document.getElementById('park-filter').value;
            if (park === 'all') {
                await loadAllParksCurve();
                return;

            if (USE_FAKE_CURVE_DATA) {
                updateTimeSeriesChart(getFakeCurveData());

            const range = getDateRangeForCurve();

            let url = `${API_BASE}/daily-curve/${park}`;
            if (range.date) {
                url += '?date=' + encodeURIComponent(range.date);
            } else {
                url += '?start=' + encodeURIComponent(range.start) + '&end=' + encodeURIComponent(range.end);
            }
            if (attraction && attraction !== 'all') {
                url += '&entity_code=' + encodeURIComponent(attraction);
            }
            const waitType = document.getElementById('wait-type-filter').value || 'actual';
            url += '&wait_type=' + encodeURIComponent(waitType);
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Daily curve request failed');
                const data = await res.json();
                const curveLen = (data.curve && data.curve.length) || 0;
                console.log('Daily curve:', url, '→', curveLen, 'points');
                if (curveLen === 0) console.warn('Daily curve empty — check API has WTI or forecast/backfill curves for this park/date');

                updateTimeSeriesChart(data);

                console.warn('Daily curve load failed:', e.message || e, '(URL:', url + ')');
                updateTimeSeriesChart({ curve: [] });
            }

                })
            );
            
            // Sort by value ascending (lowest left, highest right)
            const combined = parks.map((p, i) => ({ park: p, label: labels[i], value: parkData[i] }));
            combined.sort((a, b) => (Number(a.value) || 0) - (Number(b.value) || 0));
            parks = combined.map(c => c.park);
            labels = combined.map(c => c.label);
            const sortedData = combined.map(c => c.value);
            
            /* ── WTI Color Scale (universal, decile-based) ──────────
             * 10 steps: monochromatic pink (white → dark pink)
             * Breakpoints from deciles of the full WTI dataset.
             * From Figma brand palette. Scale is FIXED so colors
             * mean the same thing regardless of what subset is shown.
             * Recalculate deciles only when the full dataset changes
             * significantly (e.g., new parks added).
             */
            const WTI_COLORS = [
                { min: 0,    max: 13.1, bg: '#DE7394', text: '#FFFFFF' },  /* D1 — quietest 10% (3.0:1) */
                { min: 13.1, max: 15.7, bg: '#D86689', text: '#FFFFFF' },  /* D2  (3.4:1) */
                { min: 15.7, max: 18.0, bg: '#D2597F', text: '#FFFFFF' },  /* D3  (3.8:1) */
                { min: 18.0, max: 20.1, bg: '#CB4C75', text: '#FFFFFF' },  /* D4  (4.3:1) */
                { min: 20.1, max: 21.8, bg: '#C5406B', text: '#FFFFFF' },  /* D5  (4.9:1) */
                { min: 21.8, max: 23.2, bg: '#BF3360', text: '#FFFFFF' },  /* D6  (5.4:1) */
                { min: 23.2, max: 24.8, bg: '#B82656', text: '#FFFFFF' },  /* D7  (6.1:1) */
                { min: 24.8, max: 26.8, bg: '#B2194C', text: '#FFFFFF' },  /* D8  (6.7:1) */
                { min: 26.8, max: 31.6, bg: '#AC0C42', text: '#FFFFFF' },  /* D9  (7.3:1) */
                { min: 31.6, max: Infinity, bg: '#A60038', text: '#FFFFFF' },  /* D10 — busiest (7.8:1) */
            ];
            function getWtiColor(wti) {
                const v = Number(wti) || 0;
                for (const band of WTI_COLORS) {
                    if (v >= band.min && v < band.max) return band;
                }
                return WTI_COLORS[WTI_COLORS.length - 1];
            }
            
            const parkCount = parks.length;
            
            // Auto-resize WTI chart based on number of parks
            const row2 = document.querySelector('.charts-row-2');
            if (row2) {
                if (parkCount <= 3) {
                    row2.style.gridTemplateColumns = '1fr 1fr';  // Equal width for few parks
                } else if (parkCount <= 5) {
                    row2.style.gridTemplateColumns = '1.2fr 1fr'; // Slightly wider
                } else {
                    row2.style.gridTemplateColumns = '2fr 1fr';   // Full width for all parks
                }
            }
            const barPctMin = 0.5;
            const barPctMax = 0.9;
            const barPercentage = barPctMin + (barPctMax - barPctMin) * (parkCount / 12);
            
            charts.parkCompare = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: sortedData,
                        backgroundColor: 'transparent',
                        borderColor: 'transparent',
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    barThickness: 1,
                    layout: { padding: { left: 16, right: 16, top: 110, bottom: 12 } },
                    parks: parks,
                    datasets: {
                        bar: { barPercentage: barPercentage }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { display: false },
                            border: { display: true, width: 2, color: 'rgba(255, 255, 255, 0.35)' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(74, 144, 164, 0.1)' },
                            ticks: { display: false }
                        }
                    }
                },
                plugins: [{
                    id: 'lollipopStemsHeadsAndLabels',
                    afterDatasetsDraw(chart) {
                        const ctx = chart.ctx;
                        const meta = chart.getDatasetMeta(0);
                        const yScale = chart.scales.y;
                        const headRadius = 18;
                        const stemBottom = yScale.getPixelForValue(0);
                        const nameGap = 18;
                        const lineHeight = 16;
                        ctx.lineWidth = 1;
                        ctx.setLineDash([2, 3]);
                        meta.data.forEach((bar, i) => {
                            const x = bar.x;
                            const y = bar.y;
                            const value = chart.data.datasets[0].data[i];
                            const colorBand = getWtiColor(value);
                            ctx.strokeStyle = colorBand.bg + 'AA'; /* stem tinted to match head */
                            ctx.beginPath();
                            ctx.moveTo(x, stemBottom);
                            ctx.lineTo(x, y);
                            ctx.stroke();
                        });
                        ctx.setLineDash([]);
                        meta.data.forEach((bar, i) => {
                            const x = bar.x;
                            const y = bar.y;
                            const value = chart.data.datasets[0].data[i];
                            const valueText = (value != null && value !== '') ? String(Math.round(Number(value))) : '—';
                            const colorBand = getWtiColor(value);
                            ctx.fillStyle = colorBand.bg;
                            ctx.beginPath();
                            ctx.arc(x, y, headRadius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillStyle = colorBand.text;
                            ctx.font = 'bold 16px Inter, sans-serif';
                            ctx.fillText(valueText, x, y);
                            const parkName = chart.data.labels[i] || '';
                            const nameWords = (parkName + '').split(/\s+/).filter(Boolean);
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = 'rgba(233, 244, 255, 0.9)';
                            ctx.font = '14px Inter, sans-serif';
                            const blockBottom = y - headRadius - nameGap;
                            nameWords.forEach((word, wi) => {
                                ctx.fillText(word, x, blockBottom - (nameWords.length - 1 - wi) * lineHeight);
                            });
                        });
                    }
                }]
            });
        }
        
        function updateWeekdayChart(park) {
            // TODO: Implement weekday chart with historical data
            const ctx = document.getElementById('weekdayChart').getContext('2d');
            if (charts.weekday) charts.weekday.destroy();
            
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            let weekdayData = Array(7).fill(0);
            
            charts.weekday = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dayNames,
                    datasets: [{ data: weekdayData, backgroundColor: '#4a90a4' }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6a7a8a', font: { size: 9 } } },
                        y: { grid: { color: 'rgba(74,144,164,0.1)' }, ticks: { color: '#6a7a8a', font: { size: 9 } } }
                    }
                }
            });
        }
        
        async function loadProperties() {
            const select = document.getElementById('property-filter');
            const currentProperty = select.value;
            
            try {
                const response = await fetch(`${API_BASE}/properties`);
                if (!response.ok) {
                    throw new Error('Failed to fetch properties');
                }
                
                const result = await response.json();
                let properties = result.properties || [];
                if (properties.length === 0) {
                    properties = [
                        { code: 'wdw', name: 'Disney World' },
                        { code: 'dlr', name: 'Disneyland Resort' },
                        { code: 'uor', name: 'Universal Orlando' },
                        { code: 'ush', name: 'Universal Hollywood' },
                        { code: 'tdr', name: 'Tokyo Disneyland Resort' }
                    ];
                }
                select.innerHTML = '<option value="all">All Properties</option>';
                properties.forEach(prop => {
                    const opt = document.createElement('option');
                    opt.value = prop.code;
                    opt.textContent = prop.name;
                    select.appendChild(opt);
                });
                if (currentProperty && Array.from(select.options).some(opt => opt.value === currentProperty)) {
                    select.value = currentProperty;
                } else if (properties.length > 0) {
                    select.selectedIndex = 1;
                }
            } catch (e) {
                console.error('Error loading properties:', e);
                // Fallback to hardcoded list
                const fallbackProperties = [
                    { code: 'wdw', name: 'Disney World' },
                    { code: 'dlr', name: 'Disneyland Resort' },
                    { code: 'uor', name: 'Universal Orlando' },
                    { code: 'ush', name: 'Universal Hollywood' },
                    { code: 'tdr', name: 'Tokyo Disneyland Resort' }
                ];
                select.innerHTML = '<option value="all">All Properties</option>';
                fallbackProperties.forEach(prop => {
                    const opt = document.createElement('option');
                    opt.value = prop.code;
                    opt.textContent = prop.name;
                    select.appendChild(opt);
                });
            }
        }
        
        async function updateParkFilter() {
            const property = document.getElementById('property-filter').value;
            const parkSelect = document.getElementById('park-filter');
            const currentPark = parkSelect.value;
            
            parkSelect.innerHTML = '<option value="all">All Parks</option>';
            
            try {
                // Fetch parks from API, optionally filtered by property
                const url = property === 'all' 
                    ? `${API_BASE}/parks`
                    : `${API_BASE}/parks?property=${property}`;
                
                console.log('Fetching parks from:', url);
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Failed to fetch parks: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Parks API response:', result);
                const parks = result.parks || [];
                
                if (parks.length === 0) {
                    console.warn('No parks returned from API, using fallback');
                    throw new Error('No parks in response');
                }
                
                parks.forEach(park => {
                    const opt = document.createElement('option');
                    opt.value = park.code;
                    opt.textContent = park.name;
                    parkSelect.appendChild(opt);
                });
                
                // If current park is not in the filtered list, reset to first park or "all"
                if (currentPark && Array.from(parkSelect.options).some(opt => opt.value === currentPark)) {
                    parkSelect.value = currentPark;
                } else {
                    // Reset to first available option (either "all" or first park)
                    if (parkSelect.options.length > 1) {
                        parkSelect.selectedIndex = 1; // Select first park
                    } else {
                        parkSelect.value = 'all';
                    }
                }
            } catch (e) {
                console.error('Error loading parks:', e);
                // Fallback to hardcoded parks based on property
                const fallbackParks = {
                    'all': [
                        { code: 'mk', name: 'Magic Kingdom' },
                        { code: 'ep', name: 'EPCOT' },
                        { code: 'hs', name: 'Hollywood Studios' },
                        { code: 'ak', name: 'Animal Kingdom' },
                        { code: 'dl', name: 'Disneyland' },
                        { code: 'ca', name: 'California Adventure' },
                        { code: 'ioa', name: 'Islands of Adventure' },
                        { code: 'usf', name: 'Universal Studios Florida' },
                        { code: 'eu', name: 'Epic Universe' },
                        { code: 'ush', name: 'Universal Studios Hollywood' },
                        { code: 'tdl', name: 'Tokyo Disneyland' },
                        { code: 'tds', name: 'Tokyo DisneySea' }
                    ],
                    'wdw': [
                        { code: 'mk', name: 'Magic Kingdom' },
                        { code: 'ep', name: 'EPCOT' },
                        { code: 'hs', name: 'Hollywood Studios' },
                        { code: 'ak', name: 'Animal Kingdom' }
                    ],
                    'dlr': [
                        { code: 'dl', name: 'Disneyland' },
                        { code: 'ca', name: 'California Adventure' }
                    ],
                    'uor': [
                        { code: 'ioa', name: 'Islands of Adventure' },
                        { code: 'usf', name: 'Universal Studios Florida' },
                        { code: 'eu', name: 'Epic Universe' }
                    ],
                    'ush': [
                        { code: 'ush', name: 'Universal Studios Hollywood' }
                    ],
                    'tdr': [
                        { code: 'tdl', name: 'Tokyo Disneyland' },
                        { code: 'tds', name: 'Tokyo DisneySea' }
                    ]
                };
                
                const parksToShow = fallbackParks[property] || fallbackParks['all'];
                parksToShow.forEach(park => {
                    const opt = document.createElement('option');
                    opt.value = park.code;
                    opt.textContent = park.name;
                    parkSelect.appendChild(opt);
                });
            }
            
            // Clear attractions when park filter changes (will be repopulated by event listener)
        }
        
        /** Reset all slicers to default: All Properties, All Parks, All Attractions, Date = Today, Wait Type = Actual */
        async function clearAllFilters() {
            document.getElementById('property-filter').value = 'all';
            await updateParkFilter();
            document.getElementById('park-filter').value = 'all';
            document.getElementById('attraction-filter').innerHTML = '<option value="all">All Attractions</option>';
            // Date = today
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            document.getElementById('wait-type-filter').value = 'actual';
            updateKPIDisplay();
            await loadData();
            await populateAttractions();
            loadDailyCurve();
            await updateParkCompareChart();
            updateWeekdayChart(document.getElementById('park-filter').value);
        }
        
        // Event listeners
        document.getElementById('clear-all-filters').addEventListener('click', () => clearAllFilters());
        
        document.getElementById('property-filter').addEventListener('change', async () => {
            await updateParkFilter(); // This will update park options and reset park selection
            updateKPIDisplay();
            await loadData(); // Load data for the newly selected park
            await populateAttractions(); // Populate attractions for the selected park
            await updateParkCompareChart(); // Refresh Wait by Park with parks for selected property; width auto-adjusts
            updateWeekdayChart(document.getElementById('park-filter').value);
        });
        
        function updateKPIDisplay() {
            const park = document.getElementById('park-filter').value;
            const isParkSelected = park !== 'all';
            const avgLabel = document.getElementById('kpi-avg-label');
            const avgValue = document.getElementById('kpi-avg');
            const avgSubtext = document.getElementById('kpi-avg-subtext');
            
            if (isParkSelected) {
                avgLabel.textContent = 'Wait Time Index';
                avgValue.classList.add('wti');
                avgSubtext.textContent = 'minutes';
            } else {
                avgLabel.textContent = 'Avg WTI';
                avgValue.classList.add('wti');
                avgSubtext.textContent = 'all parks';
            }
        }
        
        document.getElementById('park-filter').addEventListener('change', async () => { 
            updateKPIDisplay();
            await loadData(); // Load data for the selected park (includes daily curve)
            await populateAttractions(); // Populate attractions filtered by the selected park
            await updateParkCompareChart(); // Refresh WTI lollipops
            updateWeekdayChart(document.getElementById('park-filter').value);
        });
        
        document.getElementById('wait-type-filter').addEventListener('change', () => {
            loadDailyCurve();
        });
        
        document.getElementById('attraction-filter').addEventListener('change', () => {
            // Filter top waits by attraction if needed
            if (dashboardData && dashboardData.wait_times) {
                const attraction = document.getElementById('attraction-filter').value;
                if (attraction === 'all') {
                    updateTopWaitsListFromAPI(dashboardData.wait_times);
                } else {
                    const filtered = dashboardData.wait_times.filter(w => 
                        (w.entity_name || w.entity_code) === attraction
                    );
                    updateTopWaitsListFromAPI(filtered);
                }
            }
            // Refresh the daily curve for the selected attraction
            loadDailyCurve();
        });
        
        function clearAllDateSelections() {
            // Clear all date preset buttons
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            // Clear calendar input
            document.getElementById('date-calendar-picker').value = '';
        }
        
        /** Refresh all date-sensitive charts and KPIs */
        async function onDateChanged() {
            await loadData();  // KPIs + daily curve + top waits
            await updateParkCompareChart();  // WTI lollipops
            updateWeekdayChart(document.getElementById('park-filter').value);
        }

        document.querySelectorAll('.date-preset').forEach(btn => {
            btn.addEventListener('click', () => {
                // If clicking an already active button, deselect it (allowing "none")
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                } else {
                    clearAllDateSelections();
                    btn.classList.add('active');
                }
                onDateChanged();
            });
        });
        
        function adjustCalendarDate(days) {
            const dateInput = document.getElementById('date-calendar-picker');
            // If no date is set, default to today
            let currentDate = dateInput.value ? new Date(dateInput.value + 'T00:00:00') : new Date();
            currentDate.setDate(currentDate.getDate() + days);
            
            // Format as YYYY-MM-DD
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            const formattedDate = `${year}-${month}-${day}`;
            
            dateInput.value = formattedDate;
            
            // Clear preset buttons when calendar date changes (but keep the date picker value)
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            
            // Trigger change event to update filters
            dateInput.dispatchEvent(new Event('change'));
        }
        
        // Left arrow - go back one day
        document.getElementById('date-arrow-left').addEventListener('click', () => {
            adjustCalendarDate(-1);
        });
        
        // Right arrow - go forward one day
        document.getElementById('date-arrow-right').addEventListener('click', () => {
            adjustCalendarDate(1);
        });
        
        // Today button - jump back to today
        document.getElementById('date-today-btn').addEventListener('click', () => {
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            onDateChanged();
        });
        
        // Calendar picker - when a date is manually selected, clear preset buttons
        document.getElementById('date-calendar-picker').addEventListener('change', (e) => {
            if (e.target.value) {
                // Clear all preset buttons when calendar date is manually selected
                document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
                onDateChanged();
            }
        });
        
        // Initialize on start
        (async function init() {
            // Default date picker to today
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            // Draw daily curve chart (empty) so it's visible before async load
            updateTimeSeriesChart({ curve: [] });
            await loadProperties();
            await updateParkFilter();
            updateKPIDisplay();
            await loadData();
            await populateAttractions();
            await updateParkCompareChart();
            updateWeekdayChart(document.getElementById('park-filter').value);
        })();
    </script>
