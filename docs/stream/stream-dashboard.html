        /**
         * Load average daily curve across ALL parks, trimmed to park hours window.
         * Fetches each park's curve, averages them, then trims x-axis to
         * earliest open → latest close + 1h buffer on each side.
         */
        /** Multi-park line colors — Benedictus palette (blue → pink/red) */
        const PARK_LINE_COLORS = [
            '#0A2F8F', '#EB427B', '#5A96EA', '#A60038', '#98C4F2',
            '#CA2360', '#305FD1', '#FF81AC', '#FFB1C9', '#C1DDFC',
            '#FFE0E9', '#E9F4FF'
        ];

        function updateMultiParkChart(parkCurves, parkNames) {
            const ctx = document.getElementById('timeSeriesChart').getContext('2d');
            if (charts.timeSeries) charts.timeSeries.destroy();

            // Collect all unique time slots across all parks, sorted by park-day order
            const allSlots = new Set();
            parkCurves.forEach(curve => curve.forEach(pt => allSlots.add(pt.time_slot)));
            const labels = Array.from(allSlots).sort((a, b) => parkDaySort(a, b));

            // Build a dataset per park
            let globalMax = 0;
            const datasets = parkCurves.map((curve, i) => {
                const slotMap = {};
                curve.forEach(pt => {
                    const val = pt.avg_wait != null ? pt.avg_wait : pt.wait_time_minutes;
                    if (val != null && val > 0) slotMap[pt.time_slot] = val;
                });
                const data = labels.map(ts => slotMap[ts] != null ? slotMap[ts] : null);
                const maxVal = Math.max(...data.filter(v => v != null));
                if (maxVal > globalMax) globalMax = maxVal;
                const color = PARK_LINE_COLORS[i % PARK_LINE_COLORS.length];
                return {
                    label: parkNames[i] || `Park ${i + 1}`,
                    data: data,
                    borderColor: color,
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 0,
                    spanGaps: true
                };
            }).filter(ds => ds.data.some(v => v != null)); // drop parks with no data

            const yMax = Math.max(60, Math.ceil(globalMax * 1.15 / 10) * 10);

            // Update Peak/Min KPIs from all park values
            const allVals = datasets.flatMap(ds => ds.data).filter(v => v != null && v > 0);
            if (allVals.length > 0) {
                document.getElementById('kpi-max').textContent = Math.round(Math.max(...allVals));
                document.getElementById('kpi-min').textContent = Math.round(Math.min(...allVals));
            }

            charts.timeSeries = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#e9f4ff',
                                font: { size: 10, family: 'Inter' },
                                boxWidth: 14,
                                boxHeight: 2,
                                padding: 10,
                                usePointStyle: false
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 22, 40, 0.9)',
                            titleColor: '#e9f4ff',
                            bodyColor: '#e9f4ff',
                            borderColor: 'rgba(74, 144, 164, 0.4)',
                            borderWidth: 1,
                            callbacks: {
                                label: (item) => `${item.dataset.label}: ${Math.round(item.parsed.y)} min`
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: { display: false },
                            border: { display: true, width: 2, color: 'rgba(255, 255, 255, 0.35)' },
                            ticks: { color: '#6a7a8a', font: { size: 9 }, maxTicksLimit: 20 }
                        },
                        y: {
                            display: true,
                            min: 0,
                            max: yMax,
                            grid: { display: false },
                            border: { display: false },
                            ticks: { display: false }
                        }
                    }
                }
            });

            const sub = document.getElementById('chart1-subtitle');
            const property = document.getElementById('property-filter').value;
            const level = property === 'all' ? 'property' : 'park';
            sub.textContent = `Avg wait by ${level} · ${datasets.length} ${level}${datasets.length !== 1 ? 's' : ''}`;
        }

        /** Average multiple park curves into one combined curve */
        function averageCurves(curves) {
            const slotSums = {};
            const slotCounts = {};
            curves.forEach(curve => {
                curve.forEach(pt => {
                    const ts = pt.time_slot;
                    const val = pt.avg_wait != null ? pt.avg_wait : pt.wait_time_minutes;
                    if (val != null && val > 0) {
                        slotSums[ts] = (slotSums[ts] || 0) + val;
                        slotCounts[ts] = (slotCounts[ts] || 0) + 1;
                    }
                });
            });
            return Object.keys(slotSums)
                .sort((a, b) => parkDaySort(a, b))
                .map(ts => ({ time_slot: ts, avg_wait: slotSums[ts] / slotCounts[ts] }));
        }

        async function loadAllParksCurve() {
            const dateParams = getDateQueryParams();
            const waitType = document.getElementById('wait-type-filter').value || 'actual';
            const property = document.getElementById('property-filter').value;

            try {
                if (property !== 'all') {
                    // ── Level 2: Property selected → one line per park ──
                    const parksRes = await fetch(`${API_BASE}/parks?property=${encodeURIComponent(property)}`);
                    const parksList = (await parksRes.json()).parks || [];

                    const results = await Promise.all(parksList.map(async (p) => {
                        try {
                            const url = `${API_BASE}/daily-curve/${p.code}?${dateParams}&wait_type=${encodeURIComponent(waitType)}`;
                            const res = await fetch(url);
                            if (!res.ok) return { name: p.name, curve: [] };
                            const data = await res.json();
                            return { name: p.name, curve: data.curve || [] };
                        } catch { return { name: p.name, curve: [] }; }
                    }));

                    const valid = results.filter(r => r.curve.length > 0);
                    if (valid.length === 0) { updateTimeSeriesChart({ curve: [] }); return; }

                    updateMultiParkChart(valid.map(r => r.curve), valid.map(r => r.name));
                    console.log(`Property ${property}: ${valid.length} park lines`);

                } else {
                    // ── Level 1: All Properties → one line per property ──
                    const propsRes = await fetch(`${API_BASE}/properties`);
                    const propsList = (await propsRes.json()).properties || [];

                    const results = await Promise.all(propsList.map(async (prop) => {
                        try {
                            // Get parks for this property
                            const parksRes = await fetch(`${API_BASE}/parks?property=${encodeURIComponent(prop.code)}`);
                            const parksList = (await parksRes.json()).parks || [];

                            // Fetch each park's curve
                            const parkCurves = await Promise.all(parksList.map(async (p) => {
                                try {
                                    const url = `${API_BASE}/daily-curve/${p.code}?${dateParams}&wait_type=${encodeURIComponent(waitType)}`;
                                    const res = await fetch(url);
                                    if (!res.ok) return [];
                                    const data = await res.json();
                                    return data.curve || [];
                                } catch { return []; }
                            }));

                            // Average all parks in this property into one curve
                            const validCurves = parkCurves.filter(c => c.length > 0);
                            if (validCurves.length === 0) return { name: prop.name, curve: [] };
                            return { name: prop.name, curve: averageCurves(validCurves) };
                        } catch { return { name: prop.name, curve: [] }; }
                    }));

                    const valid = results.filter(r => r.curve.length > 0);
                    if (valid.length === 0) { updateTimeSeriesChart({ curve: [] }); return; }

                    updateMultiParkChart(valid.map(r => r.curve), valid.map(r => r.name));
                    console.log(`All properties: ${valid.length} property lines`);
                }
            } catch (e) {
                console.warn('Multi-line curve failed:', e.message || e);
                updateTimeSeriesChart({ curve: [] });
            }
        }

        async function loadDailyCurve() {
            const park = document.getElementById('park-filter').value;
            if (park === 'all') {
                await loadAllParksCurve();
                return;
            }
            if (USE_FAKE_CURVE_DATA) {
                updateTimeSeriesChart(getFakeCurveData());
                return;
            }
            const range = getDateRangeForCurve();
            const attraction = document.getElementById('attraction-filter').value;
            let url = `${API_BASE}/daily-curve/${park}`;
            if (range.date) {
                url += '?date=' + encodeURIComponent(range.date);
            } else {
                url += '?start=' + encodeURIComponent(range.start) + '&end=' + encodeURIComponent(range.end);
            }
            if (attraction && attraction !== 'all') {
                url += '&entity_code=' + encodeURIComponent(attraction);
            }
            const waitType = document.getElementById('wait-type-filter').value || 'actual';
            url += '&wait_type=' + encodeURIComponent(waitType);
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Daily curve request failed');
                const data = await res.json();
                const curveLen = (data.curve && data.curve.length) || 0;
                console.log('Daily curve:', url, '→', curveLen, 'points');
                if (curveLen === 0) console.warn('Daily curve empty — check API has WTI or forecast/backfill curves for this park/date');
                // Actual observations are now merged into the curve by the API
                // (no separate actual_points fetch needed)
                updateTimeSeriesChart(data);
            } catch (e) {
                console.warn('Daily curve load failed:', e.message || e, '(URL:', url + ')');
                updateTimeSeriesChart({ curve: [] });
            }
        }
        
        // ── Distribution Box Plot ──
        async function loadDistribution() {
            const canvas = document.getElementById('distributionCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            const park = document.getElementById('park-filter').value || 'all';
            const attraction = document.getElementById('attraction-filter').value;
            const selectedDate = getSelectedDateStr();

            const property = document.getElementById('property-filter').value;
            let url = `${API_BASE}/distribution/${park}?date=${encodeURIComponent(selectedDate)}`;
            if (attraction && attraction !== 'all') {
                url += '&entity_code=' + encodeURIComponent(attraction);
            }
            if (property && property !== 'all') {
                url += '&property=' + encodeURIComponent(property);
            }

            try {
                const res = await fetch(url);
                if (!res.ok) {
                    drawEmptyDistribution(ctx, canvas, 'No distribution data');
                    document.getElementById('distribution-subtitle').textContent = 'Historical range';
                    return;
                }
                const d = await res.json();
                if (d.error) {
                    drawEmptyDistribution(ctx, canvas, d.error);
                    return;
                }
                // If API didn't find today_value, fall back to the KPI WTI
                if (d.today_value == null) {
                    const kpiVal = document.getElementById('kpi-avg').textContent;
                    const parsed = parseFloat(kpiVal);
                    if (!isNaN(parsed)) d.today_value = parsed;
                }
                drawGauge(ctx, canvas, d);
                // Update subtitle
                const sub = document.getElementById('distribution-subtitle');
                const label = d.entity_name || park.toUpperCase();
                sub.textContent = `${label} · ${d.n_days.toLocaleString()} days`;
            } catch (e) {
                console.warn('Distribution load failed:', e);
                drawEmptyDistribution(ctx, canvas, 'Load failed');
            }
        }

        function drawEmptyDistribution(ctx, canvas, msg) {
            const w = canvas.width = canvas.parentElement.clientWidth;
            const h = canvas.height = canvas.parentElement.clientHeight;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(233, 244, 255, 0.4)';
            ctx.font = '12px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(msg || 'No data', w / 2, h / 2);
        }

        function drawGauge(ctx, canvas, d) {
            const dpr = window.devicePixelRatio || 1;
            const cssW = canvas.parentElement.clientWidth;
            const cssH = canvas.parentElement.clientHeight;
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const w = cssW;
            const h = cssH;
            ctx.clearRect(0, 0, w, h);

            // Use historical min/max as the gauge range
            const gaugeMin = d.min;
            const gaugeMax = d.max;
            const gaugeRange = gaugeMax - gaugeMin || 1;

            // Gauge geometry — semicircle
            const centerX = w / 2;
            const radius = Math.min(w / 2 - 20, h * 0.42);
            const centerY = h * 0.55;
            const arcWidth = radius * 0.22;
            const startAngle = Math.PI;       // left (180°)
            const endAngle = 2 * Math.PI;     // right (360°)

            // ── Draw gauge arc segments (Benedictus: blue → white → red) ──
            const gaugeColors = [
                [10, 47, 143],    // #0A2F8F D1 dark blue (quietest)
                [48, 95, 209],    // #305FD1 D2 blue
                [90, 150, 234],   // #5A96EA D3 medium blue
                [152, 196, 242],  // #98C4F2 D4 light blue
                [193, 221, 252],  // #C1DDFC D5 pale blue
                [255, 224, 233],  // #FFE0E9 D6 pale pink
                [255, 177, 201],  // #FFB1C9 D7 light pink
                [255, 129, 172],  // #FF81AC D8 medium pink
                [235, 66, 123],   // #EB427B D9 dark pink
                [166, 0, 56],     // #A60038 D10 brand dark red (busiest)
            ];
            const segments = 60;
            for (let i = 0; i < segments; i++) {
                const t = i / segments;
                const a1 = startAngle + t * Math.PI;
                const a2 = startAngle + (i + 1) / segments * Math.PI;

                // Interpolate through the 10 WTI colors
                const colorIdx = Math.min(t * gaugeColors.length, gaugeColors.length - 1);
                const cLow = gaugeColors[Math.floor(colorIdx)];
                const cHigh = gaugeColors[Math.min(Math.ceil(colorIdx), gaugeColors.length - 1)];
                const frac = colorIdx - Math.floor(colorIdx);
                const r = Math.round(cLow[0] + (cHigh[0] - cLow[0]) * frac);
                const g = Math.round(cLow[1] + (cHigh[1] - cLow[1]) * frac);
                const b = Math.round(cLow[2] + (cHigh[2] - cLow[2]) * frac);

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, a1, a2 + 0.02);
                ctx.arc(centerX, centerY, radius - arcWidth, a2 + 0.02, a1, true);
                ctx.closePath();
                ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
                ctx.fill();
            }

            // ── Tick marks along the arc ──
            const tickCount = 5;
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= tickCount; i++) {
                const t = i / tickCount;
                const angle = startAngle + t * Math.PI;
                const innerR = radius - arcWidth - 4;
                const outerR = radius + 4;
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(angle) * innerR, centerY + Math.sin(angle) * innerR);
                ctx.lineTo(centerX + Math.cos(angle) * outerR, centerY + Math.sin(angle) * outerR);
                ctx.stroke();
            }

            // ── Needle for today's value ──
            if (d.today_value != null) {
                const pct = Math.max(0, Math.min(1, (d.today_value - gaugeMin) / gaugeRange));
                const needleAngle = startAngle + pct * Math.PI;
                const needleLen = radius + 8;
                const needleBase = 12;

                // Derive needle color from Benedictus palette to match arc position
                const colorIdx = Math.min(pct * gaugeColors.length, gaugeColors.length - 1);
                const cLow = gaugeColors[Math.floor(colorIdx)];
                const cHigh = gaugeColors[Math.min(Math.ceil(colorIdx), gaugeColors.length - 1)];
                const frac = colorIdx - Math.floor(colorIdx);
                const nr = Math.round(cLow[0] + (cHigh[0] - cLow[0]) * frac);
                const ng = Math.round(cLow[1] + (cHigh[1] - cLow[1]) * frac);
                const nb = Math.round(cLow[2] + (cHigh[2] - cLow[2]) * frac);
                const needleColor = `rgb(${nr},${ng},${nb})`;

                ctx.save();
                ctx.translate(centerX, centerY);

                // Strong drop shadow for depth (prevents blending with arc)
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // Needle — color matches its position on the gauge
                ctx.fillStyle = needleColor;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(
                    Math.cos(needleAngle) * needleLen,
                    Math.sin(needleAngle) * needleLen
                );
                ctx.lineTo(
                    Math.cos(needleAngle + Math.PI / 2) * needleBase / 2,
                    Math.sin(needleAngle + Math.PI / 2) * needleBase / 2
                );
                ctx.lineTo(
                    Math.cos(needleAngle - Math.PI / 2) * needleBase / 2,
                    Math.sin(needleAngle - Math.PI / 2) * needleBase / 2
                );
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Center hub — matches needle color
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = needleColor;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#0a1628';
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            // ── Big center value ──
            const displayVal = d.today_value != null ? Math.round(d.today_value) : '--';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillStyle = '#e9f4ff';
            ctx.font = 'bold 36px Inter, sans-serif';
            ctx.fillText(displayVal, centerX, centerY + 8);

            // "minutes" label below
            ctx.font = '12px Inter, sans-serif';
            ctx.fillStyle = 'rgba(233, 244, 255, 0.5)';
            ctx.fillText('minutes', centerX, centerY + 46);

            // ── Endpoint labels ──
            // Left: Cold January
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.font = '12px Inter, sans-serif';
            ctx.fillStyle = 'rgba(90, 150, 234, 0.95)';
            const leftLabelX = centerX - radius + 5;
            const labelY = centerY + 12;
            ctx.fillText('Cold', leftLabelX, labelY);
            ctx.fillText('January', leftLabelX, labelY + 15);

            // Right: New Year's Eve
            ctx.fillStyle = 'rgba(166, 0, 56, 0.9)';
            const rightLabelX = centerX + radius - 5;
            ctx.fillText("New Year's", rightLabelX, labelY);
            ctx.fillText('Eve', rightLabelX, labelY + 15);

            // ── Min/Max values outside the gauge ends ──
            ctx.font = 'bold 16px Inter, sans-serif';
            ctx.fillStyle = '#e9f4ff';
            ctx.textBaseline = 'middle';
            // Left value — outside the arc to the left
            ctx.textAlign = 'right';
            ctx.fillText(Math.round(gaugeMin), centerX - radius - 8, centerY);
            // Right value — outside the arc to the right
            ctx.textAlign = 'left';
            ctx.fillText(Math.round(gaugeMax), centerX + radius + 8, centerY);

            // ── Percentile label ──
            if (d.today_value != null) {
                const pct = Math.max(0, Math.min(100, Math.round(((d.today_value - gaugeMin) / gaugeRange) * 100)));
                ctx.font = '12px Inter, sans-serif';
                ctx.fillStyle = 'rgba(233, 244, 255, 0.4)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(`${pct}th percentile`, centerX, centerY + 62);
            }
        }
        
        async function updateParkCompareChart() {
            const ctx = document.getElementById('parkCompareChart').getContext('2d');
            if (charts.parkCompare) charts.parkCompare.destroy();
            
            // Use same park list as the filters; filter by selected property when not "all"
            const property = document.getElementById('property-filter').value;
            let parks = [];
            let labels = [];
            try {
                const url = property === 'all' ? `${API_BASE}/parks` : `${API_BASE}/parks?property=${encodeURIComponent(property)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(res.statusText);
                const result = await res.json();
                const list = (result.parks || []).filter(p => p && (p.code != null || p.park_code != null));
                parks = list.map(p => (p.code != null ? p.code : p.park_code));
                labels = list.map(p => (p.name != null ? p.name : (p.park_name || p.code || p.park_code || '')));
            } catch (e) {
                console.warn('Wait by Park: could not load parks from API, using fallback', e);
                parks = [];
                labels = [];
            }
            if (parks.length === 0) {
                const fallbackByProperty = {
                    wdw: { parks: ['mk', 'ep', 'hs', 'ak'], labels: ['Magic Kingdom', 'EPCOT', 'Hollywood Studios', 'Animal Kingdom'] },
                    dlr: { parks: ['dl', 'ca'], labels: ['Disneyland', 'California Adventure'] },
                    uor: { parks: ['ioa', 'usf', 'eu'], labels: ['Islands of Adventure', 'Universal Studios Florida', 'Epic Universe'] },
                    ush: { parks: ['ush'], labels: ['Universal Studios Hollywood'] },
                    tdr: { parks: ['tdl', 'tds'], labels: ['Tokyo Disneyland', 'Tokyo DisneySea'] }
                };
                const fallback = fallbackByProperty[property] || {
                    parks: ['mk', 'ep', 'hs', 'ak', 'dl', 'ca', 'ioa', 'usf', 'eu', 'ush', 'tdl', 'tds'],
                    labels: ['Magic Kingdom', 'EPCOT', 'Hollywood Studios', 'Animal Kingdom', 'Disneyland', 'California Adventure', 'Islands of Adventure', 'Universal Studios Florida', 'Epic Universe', 'Universal Studios Hollywood', 'Tokyo Disneyland', 'Tokyo DisneySea']
                };
                parks = fallback.parks;
                labels = fallback.labels;
            }
            
            // Fetch stats for each park (real data from pipeline) — pass selected date/range
            const dateParams = getDateQueryParams();
            const parkData = await Promise.all(
                parks.map(async (p) => {
                    try {
                        const res = await fetch(`${API_BASE}/stats/${p}?${dateParams}`);
                        const data = await res.json();
                        return data.wti != null ? data.wti : (data.avg_wait != null ? data.avg_wait : 0);
                    } catch {
                        return 0;
                    }
                })
            );
            
            // Sort by value ascending (lowest left, highest right)
            const combined = parks.map((p, i) => ({ park: p, label: labels[i], value: parkData[i] }));
            combined.sort((a, b) => (Number(a.value) || 0) - (Number(b.value) || 0));
            parks = combined.map(c => c.park);
            labels = combined.map(c => c.label);
            const sortedData = combined.map(c => c.value);
            
            /* ── WTI Color Scale (universal, decile-based) ──────────
             * 10 steps: monochromatic pink (white → dark pink)
             * Breakpoints from deciles of the full WTI dataset.
             * From Figma brand palette. Scale is FIXED so colors
             * mean the same thing regardless of what subset is shown.
             * Recalculate deciles only when the full dataset changes
             * significantly (e.g., new parks added).
             */
            const WTI_COLORS = [
                { min: 0,    max: 13.1, bg: '#0A2F8F', text: '#FFFFFF' },  /* D1 — quietest (dark blue) */
                { min: 13.1, max: 15.7, bg: '#305FD1', text: '#FFFFFF' },  /* D2  (blue) */
                { min: 15.7, max: 18.0, bg: '#5A96EA', text: '#FFFFFF' },  /* D3  (medium blue) */
                { min: 18.0, max: 20.1, bg: '#98C4F2', text: '#1a1a2e' },  /* D4  (light blue) */
                { min: 20.1, max: 21.8, bg: '#C1DDFC', text: '#1a1a2e' },  /* D5  (pale blue) */
                { min: 21.8, max: 23.2, bg: '#FFE0E9', text: '#1a1a2e' },  /* D6  (pale pink) */
                { min: 23.2, max: 24.8, bg: '#FFB1C9', text: '#1a1a2e' },  /* D7  (light pink) */
                { min: 24.8, max: 26.8, bg: '#FF81AC', text: '#FFFFFF' },  /* D8  (medium pink) */
                { min: 26.8, max: 31.6, bg: '#EB427B', text: '#FFFFFF' },  /* D9  (dark pink) */
                { min: 31.6, max: Infinity, bg: '#A60038', text: '#FFFFFF' },  /* D10 — busiest (brand dark red) */
            ];
            function getWtiColor(wti) {
                const v = Number(wti) || 0;
                for (const band of WTI_COLORS) {
                    if (v >= band.min && v < band.max) return band;
                }
                return WTI_COLORS[WTI_COLORS.length - 1];
            }
            
            const parkCount = parks.length;
            
            // Auto-resize WTI chart based on number of parks
            const row2 = document.querySelector('.charts-row-2');
            if (row2) {
                if (parkCount <= 3) {
                    row2.style.gridTemplateColumns = '1fr 1fr';  // Equal width for few parks
                } else if (parkCount <= 5) {
                    row2.style.gridTemplateColumns = '1.2fr 1fr'; // Slightly wider
                } else {
                    row2.style.gridTemplateColumns = '2fr 1fr';   // Full width for all parks
                }
            }
            const barPctMin = 0.5;
            const barPctMax = 0.9;
            const barPercentage = barPctMin + (barPctMax - barPctMin) * (parkCount / 12);
            
            charts.parkCompare = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: sortedData,
                        backgroundColor: 'transparent',
                        borderColor: 'transparent',
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    barThickness: 1,
                    layout: { padding: { left: 16, right: 16, top: 110, bottom: 12 } },
                    parks: parks,
                    datasets: {
                        bar: { barPercentage: barPercentage }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { display: false },
                            border: { display: true, width: 2, color: 'rgba(255, 255, 255, 0.35)' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(74, 144, 164, 0.1)' },
                            ticks: { display: false }
                        }
                    }
                },
                plugins: [{
                    id: 'lollipopStemsHeadsAndLabels',
                    afterDatasetsDraw(chart) {
                        const ctx = chart.ctx;
                        const meta = chart.getDatasetMeta(0);
                        const yScale = chart.scales.y;
                        const headRadius = 18;
                        const stemBottom = yScale.getPixelForValue(0);
                        const nameGap = 18;
                        const lineHeight = 16;
                        // Check if a specific park is selected for highlighting
                        const selectedPark = document.getElementById('park-filter').value;
                        const parkCodes = chart.options.parks || [];
                        const hasSelection = selectedPark && selectedPark !== 'all';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([2, 3]);
                        meta.data.forEach((bar, i) => {
                            const x = bar.x;
                            const y = bar.y;
                            const value = chart.data.datasets[0].data[i];
                            const isActive = !hasSelection || (parkCodes[i] && parkCodes[i].toLowerCase() === selectedPark.toLowerCase());
                            const colorBand = getWtiColor(value);
                            ctx.strokeStyle = isActive ? colorBand.bg + 'AA' : 'rgba(255,255,255,0.12)';
                            ctx.beginPath();
                            ctx.moveTo(x, stemBottom);
                            ctx.lineTo(x, y);
                            ctx.stroke();
                        });
                        ctx.setLineDash([]);
                        meta.data.forEach((bar, i) => {
                            const x = bar.x;
                            const y = bar.y;
                            const value = chart.data.datasets[0].data[i];
                            const valueText = (value != null && value !== '') ? String(Math.round(Number(value))) : '—';
                            const isActive = !hasSelection || (parkCodes[i] && parkCodes[i].toLowerCase() === selectedPark.toLowerCase());
                            const colorBand = getWtiColor(value);
                            // Head circle
                            ctx.fillStyle = isActive ? colorBand.bg : 'rgba(255,255,255,0.15)';
                            ctx.beginPath();
                            ctx.arc(x, y, headRadius, 0, Math.PI * 2);
                            ctx.fill();
                            // Value text inside head
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillStyle = isActive ? colorBand.text : 'rgba(255,255,255,0.35)';
                            ctx.font = 'bold 16px Inter, sans-serif';
                            ctx.fillText(valueText, x, y);
                            // Park name above
                            const parkName = chart.data.labels[i] || '';
                            const nameWords = (parkName + '').split(/\s+/).filter(Boolean);
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = isActive ? 'rgba(233, 244, 255, 0.9)' : 'rgba(233, 244, 255, 0.2)';
                            ctx.font = '14px Inter, sans-serif';
                            const blockBottom = y - headRadius - nameGap;
                            nameWords.forEach((word, wi) => {
                                ctx.fillText(word, x, blockBottom - (nameWords.length - 1 - wi) * lineHeight);
                            });
                        });
                    }
                }]
            });
        }
        
        async function updateTrendChart(park) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (charts.trend) charts.trend.destroy();

            // Build API URL with filters
            const parkCode = park || 'all';
            const property = document.getElementById('property-filter').value;
            let url = `${API_BASE}/trend/${parkCode}?days=90`;
            if (parkCode === 'all' && property && property !== 'all') {
                url += `&property=${property}`;
            }
            // Pass date range if set
            const params = getDateQueryParams();
            if (params.end) url += `&date=${params.end}`;
            if (params.start && params.end) {
                const d0 = new Date(params.start), d1 = new Date(params.end);
                const daysDiff = Math.round((d1 - d0) / 86400000);
                if (daysDiff > 0) url = url.replace(/days=\d+/, `days=${daysDiff}`);
            }

            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('trend fetch failed');
                const data = await resp.json();
                const points = data.points || [];

                if (points.length === 0) {
                    document.getElementById('trend-subtitle').textContent = 'No trend data available';
                    return;
                }

                const avgZ = data.avg_z_score || 0;
                const avgZSign = avgZ > 0 ? '+' : '';
                const avgZLabel = Math.abs(avgZ) >= 1.5 ? (avgZ > 0 ? ' ↑ Busy' : ' ↓ Quiet') 
                                : Math.abs(avgZ) >= 0.5 ? (avgZ > 0 ? ' ↑ Above avg' : ' ↓ Below avg')
                                : ' — Normal';
                document.getElementById('trend-subtitle').textContent =
                    `${data.park_name} — ${points.length} days — Avg z: ${avgZSign}${avgZ.toFixed(2)}${avgZLabel}`;

                const labels = points.map(p => p.date);
                const zScores = points.map(p => p.z_score);

                // Color each bar based on Benedictus scale
                const barColors = zScores.map(z => {
                    if (z >= 2.0) return 'rgba(166, 0, 56, 0.9)';      // D10 dark red
                    if (z >= 1.5) return 'rgba(235, 66, 123, 0.9)';    // D9
                    if (z >= 1.0) return 'rgba(255, 129, 172, 0.8)';   // D8
                    if (z >= 0.5) return 'rgba(255, 177, 201, 0.7)';   // D7
                    if (z > -0.5) return 'rgba(233, 244, 255, 0.4)';   // neutral
                    if (z > -1.0) return 'rgba(193, 221, 252, 0.7)';   // D5
                    if (z > -1.5) return 'rgba(152, 196, 242, 0.8)';   // D4
                    if (z > -2.0) return 'rgba(90, 150, 234, 0.9)';    // D3
                    return 'rgba(10, 47, 143, 0.9)';                    // D1 dark blue
                });

                charts.trend = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: zScores,
                            backgroundColor: barColors,
                            borderColor: barColors.map(c => c.replace(/[\d.]+\)$/, '1)')),
                            borderWidth: 1,
                            borderRadius: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    title: (items) => {
                                        const i = items[0].dataIndex;
                                        const p = points[i];
                                        return `${p.date}  (${p.date_group_id || ''})`;
                                    },
                                    label: (item) => {
                                        const p = points[item.dataIndex];
                                        const lines = [
                                            `WTI: ${p.wti} min`,
                                            `Seasonal avg: ${p.seasonal_mean} min (${p.n_comparable || 0} similar days)`,
                                            `Z-score: ${p.z_score > 0 ? '+' : ''}${p.z_score}`,
                                        ];
                                        if (p.label) lines.push(p.label);
                                        return lines;
                                    }
                                }
                            },
                            // Draw horizontal reference bands
                            annotation: undefined,
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                border: { display: true, width: 2, color: 'rgba(255, 255, 255, 0.35)' },
                                ticks: {
                                    color: '#6a7a8a',
                                    font: { size: 8 },
                                    maxRotation: 45,
                                    autoSkip: true,
                                    maxTicksLimit: 10,
                                    callback: function(val, idx) {
                                        const d = labels[idx];
                                        if (!d) return '';
                                        const parts = d.split('-');
                                        return `${parts[1]}/${parts[2]}`;
                                    }
                                }
                            },
                            y: {
                                grid: { color: 'rgba(74,144,164,0.1)' },
                                border: { display: false },
                                ticks: {
                                    color: '#6a7a8a',
                                    font: { size: 9 },
                                    callback: v => v > 0 ? `+${v}` : v
                                },
                                suggestedMin: -3,
                                suggestedMax: 3,
                            }
                        }
                    },
                    plugins: [{
                        // Draw zero line + ±2 reference bands
                        id: 'trendBands',
                        beforeDraw(chart) {
                            const { ctx: c, chartArea: { left, right, top, bottom }, scales: { y } } = chart;
                            
                            // Zero line
                            const y0 = y.getPixelForValue(0);
                            c.save();
                            c.strokeStyle = 'rgba(233, 244, 255, 0.3)';
                            c.lineWidth = 1.5;
                            c.setLineDash([4, 4]);
                            c.beginPath();
                            c.moveTo(left, y0);
                            c.lineTo(right, y0);
                            c.stroke();

                            // ±2 bands (unusually busy/quiet)
                            const y2 = y.getPixelForValue(2);
                            const yN2 = y.getPixelForValue(-2);
                            c.strokeStyle = 'rgba(166, 0, 56, 0.25)';
                            c.beginPath();
                            c.moveTo(left, y2);
                            c.lineTo(right, y2);
                            c.stroke();
                            c.strokeStyle = 'rgba(10, 47, 143, 0.25)';
                            c.beginPath();
                            c.moveTo(left, yN2);
                            c.lineTo(right, yN2);
                            c.stroke();
                            c.setLineDash([]);
                            c.restore();
                        }
                    }]
                });
            } catch (err) {
                console.warn('Trend chart error:', err);
                document.getElementById('trend-subtitle').textContent = 'Trend unavailable';
            }
        }
        
        async function loadProperties() {
            const select = document.getElementById('property-filter');
            const currentProperty = select.value;
            
            try {
                const response = await fetch(`${API_BASE}/properties`);
                if (!response.ok) {
                    throw new Error('Failed to fetch properties');
                }
                
                const result = await response.json();
                let properties = result.properties || [];
                if (properties.length === 0) {
                    properties = [
                        { code: 'wdw', name: 'Disney World' },
                        { code: 'dlr', name: 'Disneyland Resort' },
                        { code: 'uor', name: 'Universal Orlando' },
                        { code: 'ush', name: 'Universal Hollywood' },
                        { code: 'tdr', name: 'Tokyo Disneyland Resort' }
                    ];
                }
                select.innerHTML = '<option value="all">All Properties</option>';
                properties.forEach(prop => {
                    const opt = document.createElement('option');
                    opt.value = prop.code;
                    opt.textContent = prop.name;
                    select.appendChild(opt);
                });
                if (currentProperty && Array.from(select.options).some(opt => opt.value === currentProperty)) {
                    select.value = currentProperty;
                } else if (properties.length > 0) {
                    select.selectedIndex = 1;
                }
            } catch (e) {
                console.error('Error loading properties:', e);
                // Fallback to hardcoded list
                const fallbackProperties = [
                    { code: 'wdw', name: 'Disney World' },
                    { code: 'dlr', name: 'Disneyland Resort' },
                    { code: 'uor', name: 'Universal Orlando' },
                    { code: 'ush', name: 'Universal Hollywood' },
                    { code: 'tdr', name: 'Tokyo Disneyland Resort' }
                ];
                select.innerHTML = '<option value="all">All Properties</option>';
                fallbackProperties.forEach(prop => {
                    const opt = document.createElement('option');
                    opt.value = prop.code;
                    opt.textContent = prop.name;
                    select.appendChild(opt);
                });
            }
        }
        
        async function updateParkFilter() {
            const property = document.getElementById('property-filter').value;
            const parkSelect = document.getElementById('park-filter');
            const currentPark = parkSelect.value;
            
            parkSelect.innerHTML = '<option value="all">All Parks</option>';
            
            try {
                // Fetch parks from API, optionally filtered by property
                const url = property === 'all' 
                    ? `${API_BASE}/parks`
                    : `${API_BASE}/parks?property=${property}`;
                
                console.log('Fetching parks from:', url);
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Failed to fetch parks: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Parks API response:', result);
                const parks = result.parks || [];
                
                if (parks.length === 0) {
                    console.warn('No parks returned from API, using fallback');
                    throw new Error('No parks in response');
                }
                
                parks.forEach(park => {
                    const opt = document.createElement('option');
                    opt.value = park.code;
                    opt.textContent = park.name;
                    parkSelect.appendChild(opt);
                });
                
                // If current park is not in the filtered list, reset to first park or "all"
                if (currentPark && Array.from(parkSelect.options).some(opt => opt.value === currentPark)) {
                    parkSelect.value = currentPark;
                } else {
                    // Reset to first available option (either "all" or first park)
                    if (parkSelect.options.length > 1) {
                        parkSelect.selectedIndex = 1; // Select first park
                    } else {
                        parkSelect.value = 'all';
                    }
                }
            } catch (e) {
                console.error('Error loading parks:', e);
                // Fallback to hardcoded parks based on property
                const fallbackParks = {
                    'all': [
                        { code: 'mk', name: 'Magic Kingdom' },
                        { code: 'ep', name: 'EPCOT' },
                        { code: 'hs', name: 'Hollywood Studios' },
                        { code: 'ak', name: 'Animal Kingdom' },
                        { code: 'dl', name: 'Disneyland' },
                        { code: 'ca', name: 'California Adventure' },
                        { code: 'ioa', name: 'Islands of Adventure' },
                        { code: 'usf', name: 'Universal Studios Florida' },
                        { code: 'eu', name: 'Epic Universe' },
                        { code: 'ush', name: 'Universal Studios Hollywood' },
                        { code: 'tdl', name: 'Tokyo Disneyland' },
                        { code: 'tds', name: 'Tokyo DisneySea' }
                    ],
                    'wdw': [
                        { code: 'mk', name: 'Magic Kingdom' },
                        { code: 'ep', name: 'EPCOT' },
                        { code: 'hs', name: 'Hollywood Studios' },
                        { code: 'ak', name: 'Animal Kingdom' }
                    ],
                    'dlr': [
                        { code: 'dl', name: 'Disneyland' },
                        { code: 'ca', name: 'California Adventure' }
                    ],
                    'uor': [
                        { code: 'ioa', name: 'Islands of Adventure' },
                        { code: 'usf', name: 'Universal Studios Florida' },
                        { code: 'eu', name: 'Epic Universe' }
                    ],
                    'ush': [
                        { code: 'ush', name: 'Universal Studios Hollywood' }
                    ],
                    'tdr': [
                        { code: 'tdl', name: 'Tokyo Disneyland' },
                        { code: 'tds', name: 'Tokyo DisneySea' }
                    ]
                };
                
                const parksToShow = fallbackParks[property] || fallbackParks['all'];
                parksToShow.forEach(park => {
                    const opt = document.createElement('option');
                    opt.value = park.code;
                    opt.textContent = park.name;
                    parkSelect.appendChild(opt);
                });
            }
            
            // Clear attractions when park filter changes (will be repopulated by event listener)
        }
        
        /** Reset all slicers to default: All Properties, All Parks, All Attractions, Date = Today, Wait Type = Actual */
        async function clearAllFilters() {
            document.getElementById('property-filter').value = 'all';
            await updateParkFilter();
            document.getElementById('park-filter').value = 'all';
            document.getElementById('attraction-filter').innerHTML = '<option value="all">All Attractions</option>';
            // Date = today
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            document.getElementById('wait-type-filter').value = 'actual';
            updateKPIDisplay();
            await loadData();
            await populateAttractions();
            loadDailyCurve();
            loadDistribution();
            await updateParkCompareChart();
            updateTrendChart(document.getElementById('park-filter').value);
        }
        
        // Event listeners
        document.getElementById('clear-all-filters').addEventListener('click', () => clearAllFilters());
        
        document.getElementById('property-filter').addEventListener('change', async () => {
            await updateParkFilter(); // This will update park options and reset park selection
            // Reset attraction filter to prevent stale entity codes
            document.getElementById('attraction-filter').innerHTML = '<option value="all">All Attractions</option>';
            updateKPIDisplay();
            await loadData(); // Load data for the newly selected park
            await populateAttractions(); // Populate attractions for the selected park
            await updateParkCompareChart(); // Refresh Wait by Park with parks for selected property; width auto-adjusts
            updateTrendChart(document.getElementById('park-filter').value);
            loadDistribution();
        });
        
        function updateKPIDisplay() {
            const park = document.getElementById('park-filter').value;
            const isParkSelected = park !== 'all';
            const avgLabel = document.getElementById('kpi-avg-label');
            const avgValue = document.getElementById('kpi-avg');
            const avgSubtext = document.getElementById('kpi-avg-subtext');
            
            if (isParkSelected) {
                avgLabel.textContent = 'Wait Time Index';
                avgValue.classList.add('wti');
                avgSubtext.textContent = 'minutes';
            } else {
                avgLabel.textContent = 'Avg WTI';
                avgValue.classList.add('wti');
                avgSubtext.textContent = 'all parks';
            }
        }
        
        document.getElementById('park-filter').addEventListener('change', async () => { 
            // Reset attraction filter FIRST to prevent stale entity codes
            document.getElementById('attraction-filter').innerHTML = '<option value="all">All Attractions</option>';
            updateKPIDisplay();
            await loadData(); // Load data for the selected park (includes daily curve)
            await populateAttractions(); // Populate attractions filtered by the selected park
            await updateParkCompareChart(); // Refresh WTI lollipops
            updateTrendChart(document.getElementById('park-filter').value);
            loadDistribution();
        });
        
        document.getElementById('wait-type-filter').addEventListener('change', () => {
            loadDailyCurve();
            loadDistribution();
        });
        
        document.getElementById('attraction-filter').addEventListener('change', () => {
            // Refresh the daily curve and distribution for the selected attraction
            loadDailyCurve();
            loadDistribution();
        });
        
        function clearAllDateSelections() {
            // Clear all date preset buttons
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            // Clear calendar input
            document.getElementById('date-calendar-picker').value = '';
        }
        
        /** Refresh all date-sensitive charts and KPIs */
        async function onDateChanged() {
            await loadData();  // KPIs + daily curve + distribution
            await updateParkCompareChart();  // WTI lollipops
            updateTrendChart(document.getElementById('park-filter').value);
            loadDistribution();
        }

        document.querySelectorAll('.date-preset').forEach(btn => {
            btn.addEventListener('click', () => {
                // If clicking an already active button, deselect it (allowing "none")
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                } else {
                    clearAllDateSelections();
                    btn.classList.add('active');
                }
                onDateChanged();
            });
        });
        
        function adjustCalendarDate(days) {
            const dateInput = document.getElementById('date-calendar-picker');
            // If no date is set, default to today
            let currentDate = dateInput.value ? new Date(dateInput.value + 'T00:00:00') : new Date();
            currentDate.setDate(currentDate.getDate() + days);
            
            // Format as YYYY-MM-DD
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            const formattedDate = `${year}-${month}-${day}`;
            
            dateInput.value = formattedDate;
            
            // Clear preset buttons when calendar date changes (but keep the date picker value)
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            
            // Trigger change event to update filters
            dateInput.dispatchEvent(new Event('change'));
        }
        
        // Left arrow - go back one day
        document.getElementById('date-arrow-left').addEventListener('click', () => {
            adjustCalendarDate(-1);
        });
        
        // Right arrow - go forward one day
        document.getElementById('date-arrow-right').addEventListener('click', () => {
            adjustCalendarDate(1);
        });
        
        // Today button - jump back to today
        document.getElementById('date-today-btn').addEventListener('click', () => {
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
            onDateChanged();
        });
        
        // Calendar picker - when a date is manually selected, clear preset buttons
        document.getElementById('date-calendar-picker').addEventListener('change', (e) => {
            if (e.target.value) {
                // Clear all preset buttons when calendar date is manually selected
                document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
                onDateChanged();
            }
        });
        
        // Initialize on start
        (async function init() {
            // Default date picker to today
            const today = new Date();
            const y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-calendar-picker').value = `${y}-${m}-${d}`;
            // Draw daily curve chart (empty) so it's visible before async load
            updateTimeSeriesChart({ curve: [] });
            await loadProperties();
            await updateParkFilter();
            updateKPIDisplay();
            await loadData();
            await populateAttractions();
            await updateParkCompareChart();
            updateTrendChart(document.getElementById('park-filter').value);
            loadDistribution();
        })();
    </script>
</body>
