<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HazeyData — Fred & Wilma Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      color: #e9f4ff;
      overflow: hidden;
    }

    /* For preview - remove for OBS */
    body.preview-mode {
      background: #0a1628;
    }

    @keyframes borderGlow {
      0%, 100% { 
        box-shadow: 0 0 10px rgba(74, 144, 164, 0.3),
                    inset 0 0 10px rgba(74, 144, 164, 0.05);
      }
      50% { 
        box-shadow: 0 0 20px rgba(74, 144, 164, 0.5),
                    inset 0 0 15px rgba(74, 144, 164, 0.1);
      }
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-wrapper {
      width: 320px;
      height: 536px;  /* Matches third-box slot in main dashboard */
      background: rgba(10, 22, 40, 0.92);
      border: 1px solid rgba(74, 144, 164, 0.5);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: borderGlow 6s ease-in-out infinite;
    }

    .chat-header {
      background: rgba(74, 144, 164, 0.2);
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #4a90a4;
      border-bottom: 1px solid rgba(74, 144, 164, 0.3);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header .live {
      color: #00ff88;
      animation: livePulse 2s ease-in-out infinite;
      font-size: 10px;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: slideIn 0.3s ease-out;
    }

    .message.fred {
      align-items: flex-end;
    }

    .message.wilma {
      align-items: flex-start;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a90a4;
    }

    .message.fred .message-header {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 1px solid rgba(74, 144, 164, 0.4);
    }

    .message.fred .avatar {
      background: rgba(74, 144, 164, 0.3);
    }

    .message.wilma .avatar {
      background: rgba(166, 0, 56, 0.3);
      border-color: rgba(166, 0, 56, 0.5);
    }

    .bubble {
      max-width: 280px;  /* Adjusted for 320px wrapper */
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.fred .bubble {
      background: rgba(74, 144, 164, 0.25);
      border: 1px solid rgba(74, 144, 164, 0.4);
      border-right: 3px solid #4a90a4;
      color: #e9f4ff;
    }

    .message.wilma .bubble {
      background: rgba(166, 0, 56, 0.15);
      border: 1px solid rgba(166, 0, 56, 0.3);
      border-left: 3px solid #a60038;
      color: #e9f4ff;
    }

    .typing-indicator {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 0 16px 16px 16px;
    }

    .typing-indicator.active {
      display: flex;
    }

    .typing-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a90a4;
    }

    .typing-avatar {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: rgba(166, 0, 56, 0.3);
      border: 1px solid rgba(166, 0, 56, 0.5);
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      background: rgba(166, 0, 56, 0.15);
      border: 1px solid rgba(166, 0, 56, 0.3);
      border-left: 3px solid #a60038;
      border-radius: 4px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: #a60038;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(74, 144, 164, 0.3);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(74, 144, 164, 0.5);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(74, 144, 164, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Idle fade out */
    .chat-wrapper {
      transition: opacity 1s ease-in-out;
    }

    .chat-wrapper.idle {
      opacity: 0;
    }

    .chat-wrapper.active {
      opacity: 1;
    }
  </style>
</head>
<body class="preview-mode">
  <div class="chat-wrapper active">
    <div class="chat-header">
      <span>FRED_WILMA_CHAT</span>
      <span class="live">● LIVE</span>
    </div>
    
    <div class="chat-container" id="chat">
      <div class="empty-state" id="empty">// AWAITING TRANSMISSION</div>
    </div>
    
    <div class="typing-indicator" id="typing">
      <div class="typing-header">
        <div class="typing-avatar">🦴</div>
        <span>Wilma</span>
      </div>
      <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat');
    const typingIndicator = document.getElementById('typing');
    const emptyState = document.getElementById('empty');
    const chatWrapper = document.querySelector('.chat-wrapper');
    let lastMessageId = null;
    let lastActivityTime = Date.now();
    let isIdle = false;
    const MAX_MESSAGES = 8; // Keep last N messages visible
    // Get idle timeout from URL param or default to 30 seconds
    // Usage: chat-overlay.html?idle=45 (for 45 seconds)
    const urlParams = new URLSearchParams(window.location.search);
    const IDLE_TIMEOUT_MS = (parseInt(urlParams.get('idle')) || 30) * 1000;

    function resetIdleTimer() {
      lastActivityTime = Date.now();
      if (isIdle) {
        isIdle = false;
        chatWrapper.classList.remove('idle');
        chatWrapper.classList.add('active');
      }
    }

    function checkIdle() {
      const now = Date.now();
      if (!isIdle && (now - lastActivityTime > IDLE_TIMEOUT_MS)) {
        isIdle = true;
        chatWrapper.classList.remove('active');
        chatWrapper.classList.add('idle');
      }
    }

    async function fetchMessages() {
      try {
        const response = await fetch('chat.json?' + Date.now());
        if (!response.ok) return;
        
        const data = await response.json();
        
        // Update typing indicator
        if (data.typing) {
          typingIndicator.classList.add('active');
          resetIdleTimer(); // Typing counts as activity
        } else {
          typingIndicator.classList.remove('active');
        }

        // Check if we have new messages
        const messages = data.messages || [];
        const latestId = messages.length > 0 ? messages[messages.length - 1].id : null;
        
        if (latestId !== lastMessageId) {
          renderMessages(messages);
          lastMessageId = latestId;
          if (messages.length > 0) {
            resetIdleTimer(); // New message = activity
          }
        }
        
        // Check for idle timeout
        checkIdle();
      } catch (e) {
        console.log('Waiting for chat.json...');
      }
    }

    function renderMessages(messages) {
      // Show/hide empty state
      if (messages.length === 0) {
        emptyState.style.display = 'flex';
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        return;
      }
      
      emptyState.style.display = 'none';
      
      // Keep only the last MAX_MESSAGES
      const recentMessages = messages.slice(-MAX_MESSAGES);
      
      chatContainer.innerHTML = recentMessages.map(msg => `
        <div class="message ${msg.sender.toLowerCase()}">
          <div class="message-header">
            <div class="avatar">${msg.sender === 'Fred' ? '🎳' : '🦴'}</div>
            <span>${msg.sender}</span>
          </div>
          <div class="bubble">${escapeHtml(msg.text)}</div>
        </div>
      `).join('');

      // Scroll to bottom
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Poll every 500ms
    setInterval(fetchMessages, 500);
    fetchMessages();
  </script>
</body>
</html>
