<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Theme Park Crowd Report — Starting Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1920px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Banner as full background */
        .banner-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('./assets/banner.jpg') center center / cover no-repeat;
            z-index: 0;
        }

        /* Dark overlay for readability */
        .banner-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(
                180deg,
                rgba(10, 22, 40, 0.3) 0%,
                rgba(10, 22, 40, 0.5) 40%,
                rgba(10, 22, 40, 0.85) 100%
            );
        }

        /* Scanlines for stream aesthetic */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.015) 0px,
                rgba(0,0,0,0.015) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        .content {
            text-align: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-family: 'Inter', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -1px;
            line-height: 1.05;
            margin-bottom: 12px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 60px rgba(166, 0, 56, 0.3);
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 16px;
            animation: pulse 2.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .countdown {
            font-family: 'JetBrains Mono', monospace;
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(135deg, #5A96EA, #D2C8DC, #EB427B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(235, 66, 123, 0.4));
            margin-bottom: 50px;
        }
        
        .social-bar {
            display: flex;
            gap: 50px;
            justify-content: center;
        }
        
        .social-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: rgba(255,255,255,0.65);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .social-item span {
            color: rgba(210, 200, 220, 0.9);
        }

        /* Corner accents — Benedictus colors */
        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
        }
        .corner.tl { top: 40px; left: 40px; border-top: 2px solid rgba(90,150,234,0.4); border-left: 2px solid rgba(90,150,234,0.4); }
        .corner.tr { top: 40px; right: 40px; border-top: 2px solid rgba(235,66,123,0.4); border-right: 2px solid rgba(235,66,123,0.4); }
        .corner.bl { bottom: 40px; left: 40px; border-bottom: 2px solid rgba(90,150,234,0.4); border-left: 2px solid rgba(90,150,234,0.4); }
        .corner.br { bottom: 40px; right: 40px; border-bottom: 2px solid rgba(235,66,123,0.4); border-right: 2px solid rgba(235,66,123,0.4); }
    </style>
</head>
<body>
    <div class="banner-bg"></div>
    <div class="scanlines"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    
    <div class="content">
        <div class="title">THEME PARK<br>CROWD REPORT</div>
        <div class="subtitle">Know Before You Go</div>
        <div class="tagline">Wait time predictions for every Disney & Universal park</div>
        <div class="status">stream starting soon</div>
        <div class="countdown" id="countdown">05:00</div>
        <div class="social-bar">
            <div class="social-item">🎮 <span>discord.gg/Bz89uXrD</span></div>
            <div class="social-item">🌐 <span>hazeydata.ai</span></div>
            <div class="social-item">💜 <span>twitch.tv/hazeydata</span></div>
        </div>
    </div>
    
    <script>
        let totalSeconds = 5 * 60;
        
        function updateCountdown() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('countdown').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('minutes')) {
            totalSeconds = parseInt(params.get('minutes')) * 60;
        }
        
        updateCountdown();
    </script>
</body>
</html>
