<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Theme Park Crowd Report — Starting Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1920px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
            background: #0a1628;
        }

        /* Banner as top hero — native size scaled to full width */
        .banner {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Bottom section: dark area for countdown + socials */
        .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 340px;
            background: linear-gradient(180deg, transparent 0%, #0a1628 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 6px;
            text-transform: uppercase;
            animation: pulse 2.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .countdown {
            font-family: 'JetBrains Mono', monospace;
            font-size: 130px;
            font-weight: 700;
            background: linear-gradient(135deg, #5A96EA, #D2C8DC, #EB427B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(235, 66, 123, 0.4));
            line-height: 1;
        }
        
        .social-bar {
            display: flex;
            gap: 50px;
            justify-content: center;
            margin-top: 8px;
        }
        
        .social-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .social-item span {
            color: rgba(210, 200, 220, 0.8);
        }
    </style>
</head>
<body>
    <img class="banner" src="./assets/banner.jpg" alt="">

    <div class="bottom">
        <div class="status">stream starting soon</div>
        <div class="countdown" id="countdown">05:00</div>
        <div class="social-bar">
            <div class="social-item">🎮 <span>discord.gg/Bz89uXrD</span></div>
            <div class="social-item">🌐 <span>hazeydata.ai</span></div>
            <div class="social-item">💜 <span>twitch.tv/hazeydata</span></div>
        </div>
    </div>
    
    <script>
        let totalSeconds = 5 * 60;
        
        function updateCountdown() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('countdown').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('minutes')) {
            totalSeconds = parseInt(params.get('minutes')) * 60;
        }
        
        updateCountdown();
    </script>
</body>
</html>
