<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦴 Mission Control | hazeydata.ai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff; line-height: 1.6; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 4px; }
        .header .sub { color: #8892b0; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 20px;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 12px; color: #ccd6f6; }
        .card-full { grid-column: 1 / -1; }
        .item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item:last-child { border-bottom: none; }
        .badge {
            font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 4px;
            white-space: nowrap; text-transform: uppercase;
        }
        .badge-done { background: #1a3a2a; color: #4ade80; }
        .badge-high { background: #3a1a1a; color: #f87171; }
        .badge-medium { background: #3a2a1a; color: #fbbf24; }
        .badge-active { background: #1a2a3a; color: #60a5fa; }
        .item-text { flex: 1; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #8892b0; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .val { font-weight: 600; color: #ccd6f6; }
        .good { color: #4ade80; }
        .warn { color: #fbbf24; }
        .bad { color: #f87171; }
        .meter { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); margin-top: 4px; }
        .meter-fill { height: 100%; border-radius: 3px; }
        .refresh { text-align: center; margin-top: 20px; color: #8892b0; font-size: 0.8rem; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦴 Mission Control</h1>
            <div class="sub" id="lastUpdated">Loading...</div>
        </div>
        <div class="grid" id="grid">
            <div class="card"><h2>Loading...</h2></div>
        </div>
        <div class="refresh" id="refresh"></div>
    </div>
    <script>
    const JSON_URL = 'mission-control-content.json';

    async function load() {
        try {
            const r = await fetch(JSON_URL + '?t=' + Date.now());
            const d = await r.json();
            render(d);
        } catch(e) {
            document.getElementById('grid').innerHTML = '<div class="card"><h2>❌ Failed to load data</h2><p>'+e.message+'</p></div>';
        }
    }

    function badgeClass(sc) {
        if (sc === 'done') return 'badge-done';
        if (sc === 'high') return 'badge-high';
        if (sc === 'medium') return 'badge-medium';
        return 'badge-active';
    }

    function render(d) {
        const ts = d.last_updated ? new Date(d.last_updated).toLocaleString() : 'Unknown';
        document.getElementById('lastUpdated').textContent = 'Last updated: ' + ts;

        let html = '';

        // Today's Focus
        html += '<div class="card"><h2>🎯 Today\'s Priorities</h2>';
        (d.todays_focus || []).forEach(item => {
            html += `<div class="item"><span class="badge ${badgeClass(item.status_class)}">${item.status_text}</span><span class="item-text">${item.task}</span></div>`;
        });
        html += '</div>';

        // /Ask Analytics
        if (d.ask_analytics) {
            const a = d.ask_analytics;
            html += '<div class="card"><h2>🤖 /ask Analytics</h2><table>';
            html += `<tr><td>Questions</td><td class="val">${a.total_questions}</td></tr>`;
            html += `<tr><td>Unique Users</td><td class="val">${a.unique_users}</td></tr>`;
            html += `<tr><td>👍 / 👎</td><td class="val good">${a.thumbs_up} / ${a.thumbs_down}</td></tr>`;
            html += `<tr><td>Avg Response</td><td class="val">${(a.avg_response_ms/1000).toFixed(1)}s</td></tr>`;
            html += `<tr><td>Model</td><td class="val">${a.model}</td></tr>`;
            html += '</table></div>';
        }

        // Accuracy
        if (d.accuracy) {
            const a = d.accuracy;
            html += '<div class="card"><h2>📊 Forecast Accuracy</h2><table>';
            html += '<tr><th>Metric</th><th>Cumulative</th><th>Yesterday</th></tr>';
            html += `<tr><td>Entity MAE</td><td class="val">${a.entity_mae}</td><td class="val">${a.yesterday_entity_mae || '—'}</td></tr>`;
            html += `<tr><td>WTI MAE</td><td class="val">${a.wti_mae}</td><td class="val good">${a.yesterday_wti_mae || '—'}</td></tr>`;
            html += `<tr><td>Entity Bias</td><td class="val">${a.entity_bias}</td><td>—</td></tr>`;
            html += `<tr><td>WTI Bias</td><td class="val">${a.wti_bias}</td><td>—</td></tr>`;
            html += `<tr><td>Days Eval</td><td class="val">${a.days_evaluated}</td><td>—</td></tr>`;
            html += '</table></div>';
        }

        // Pipeline
        if (d.pipeline_status) {
            html += '<div class="card"><h2>🔧 Pipeline Status</h2>';
            Object.entries(d.pipeline_status).forEach(([key, p]) => {
                const bc = p.status === 'done' ? 'badge-done' : p.status === 'running' ? 'badge-active' : 'badge-medium';
                const label = p.status === 'done' ? '✅' : p.status === 'running' ? '🔄' : '⏳';
                html += `<div class="item"><span class="badge ${bc}">${label} ${p.status}</span><span class="item-text"><strong>${p.label}</strong> — ${p.detail}</span></div>`;
            });
            html += '</div>';
        }

        // Infrastructure
        if (d.infrastructure) {
            const inf = d.infrastructure;
            html += '<div class="card"><h2>🖥️ Infrastructure</h2>';

            // Services
            (inf.services || []).forEach(s => {
                const bc = s.status === 'active' ? 'badge-done' : 'badge-high';
                html += `<div class="item"><span class="badge ${bc}">${s.status}</span><span class="item-text"><strong>${s.name}</strong> — ${s.detail}</span></div>`;
            });

            // Disk
            html += '<div style="margin-top:12px"><strong>Disk</strong></div>';
            const mainPct = inf.disk_main_pct || 0;
            const dataPct = inf.disk_data_pct || 0;
            const mainColor = mainPct > 85 ? '#f87171' : mainPct > 70 ? '#fbbf24' : '#4ade80';
            const dataColor = dataPct > 85 ? '#f87171' : '#4ade80';
            html += `<div style="margin-top:6px;font-size:0.85rem">Main (/) — ${mainPct}%<div class="meter"><div class="meter-fill" style="width:${mainPct}%;background:${mainColor}"></div></div></div>`;
            html += `<div style="margin-top:6px;font-size:0.85rem">Data (/mnt/data) — ${dataPct}%<div class="meter"><div class="meter-fill" style="width:${dataPct}%;background:${dataColor}"></div></div></div>`;

            // DB
            html += '<div style="margin-top:12px"><strong>Database</strong></div><table>';
            html += `<tr><td>Entities</td><td class="val">${(inf.db_entities||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>Forecasts</td><td class="val">${(inf.db_forecasts||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>Live Waits</td><td class="val">${(inf.db_live_waits||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>WTI</td><td class="val">${(inf.db_wti||0).toLocaleString()}</td></tr>`;
            html += '</table></div>';
        }

        // Key Dates
        if (d.key_dates && d.key_dates.length) {
            html += '<div class="card"><h2>📅 Key Dates</h2>';
            d.key_dates.forEach(k => {
                html += `<div class="item"><span style="font-size:1.2rem">${k.emoji}</span><span class="item-text"><strong>${k.event}</strong> — ${k.date} ${k.urgency ? '<span class="badge badge-high">'+k.urgency+'</span>' : ''}</span></div>`;
            });
            html += '</div>';
        }

        document.getElementById('grid').innerHTML = html;
        document.getElementById('refresh').innerHTML = 'Auto-refreshes every 60s • <a href="https://hazeydata.ai">hazeydata.ai</a> • <a href="https://discord.gg/Bz89uXrD">Discord</a>';
    }

    load();
    setInterval(load, 60000);
    </script>
</body>
</html>
