<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HazeyData — Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           RESET & DESIGN SYSTEM
           ═══════════════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f1d32;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border-card: rgba(255,255,255,0.08);
            --border-accent: rgba(74,144,164,0.3);
            --accent: #4a90a4;
            --accent-light: #6bb5c9;
            --accent-red: #A60038;
            --accent-red-light: #e05577;
            --accent-orange: #fb923c;
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --font-text: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background: linear-gradient(160deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            font-family: var(--font-text);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════════════
           HEADER (matches team.html / office.html)
           ═══════════════════════════════════════════════════ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-card);
            background: rgba(0,0,0,0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-red), transparent);
            opacity: 0.4;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }
        .logo-sub {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 12px;
        }
        .header-right a {
            color: var(--accent-light);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.5px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .header-right a:hover { opacity: 1; }

        .last-updated {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 11px;
        }

        /* ═══════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
        }

        /* ═══════════════════════════════════════════════════
           CARDS
           ═══════════════════════════════════════════════════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 18px 20px;
            transition: background 0.2s, border-color 0.2s;
        }
        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
        }
        .card h2 {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(74,144,164,0.15);
        }
        .card-full { grid-column: 1 / -1; }

        /* ═══════════════════════════════════════════════════
           ITEMS & BADGES
           ═══════════════════════════════════════════════════ */
        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .item:last-child { border-bottom: none; }

        .badge {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-done    { background: rgba(74,222,128,0.12); color: var(--accent-green); border: 1px solid rgba(74,222,128,0.2); }
        .badge-high    { background: rgba(166,0,56,0.15); color: var(--accent-red-light); border: 1px solid rgba(166,0,56,0.25); }
        .badge-medium  { background: rgba(251,191,36,0.12); color: var(--accent-yellow); border: 1px solid rgba(251,191,36,0.2); }
        .badge-active  { background: rgba(74,144,164,0.12); color: var(--accent-light); border: 1px solid rgba(74,144,164,0.2); }

        .item-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .item-text strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════════════
           TABLES
           ═══════════════════════════════════════════════════ */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: var(--text-secondary);
        }
        .val {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text-primary);
        }
        .good { color: var(--accent-green); }
        .warn { color: var(--accent-yellow); }
        .bad  { color: var(--accent-red-light); }

        /* ═══════════════════════════════════════════════════
           METERS
           ═══════════════════════════════════════════════════ */
        .meter {
            height: 5px;
            border-radius: 3px;
            background: rgba(255,255,255,0.06);
            margin-top: 4px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* ═══════════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════════ */
        .footer {
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            color: var(--text-muted);
            font-size: 11px;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover { color: var(--accent-light); }

        /* ═══════════════════════════════════════════════════
           LIVE INDICATOR
           ═══════════════════════════════════════════════════ */
        .live-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-green);
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: inherit;
            opacity: 0;
            animation: live-pulse 2s ease-in-out infinite;
        }
        @keyframes live-pulse {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.6); }
        }

        /* ═══════════════════════════════════════════════════
           CARD ANIMATIONS
           ═══════════════════════════════════════════════════ */
        @keyframes card-fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            animation: card-fade-in 0.4s ease-out both;
        }
        .grid .card:nth-child(1) { animation-delay: 0.05s; }
        .grid .card:nth-child(2) { animation-delay: 0.10s; }
        .grid .card:nth-child(3) { animation-delay: 0.15s; }
        .grid .card:nth-child(4) { animation-delay: 0.20s; }
        .grid .card:nth-child(5) { animation-delay: 0.25s; }
        .grid .card:nth-child(6) { animation-delay: 0.30s; }
        .grid .card:nth-child(7) { animation-delay: 0.35s; }
        .grid .card:nth-child(8) { animation-delay: 0.40s; }

        /* ═══════════════════════════════════════════════════
           SECTION LABELS (inline in JS)
           ═══════════════════════════════════════════════════ */
        .section-label {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 14px;
            margin-bottom: 6px;
        }
        .disk-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .disk-label span {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ═══════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .header {
                padding: 10px 14px;
            }
            .logo { font-size: 14px; }
            .logo-sub { font-size: 9px; }
            .header-right { gap: 8px; }
            .header-right a { font-size: 10px; padding: 3px 6px; }
            .container { padding: 14px; }
            .grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .card { padding: 14px 16px; }
            .card h2 { font-size: 11px; }
        }
    </style>
</head>
<body>
    <!-- ═══ HEADER ═══ -->
    <div class="header">
        <div class="header-left">
            <div>
                <div class="logo">HAZEYDATA</div>
                <div class="logo-sub">MISSION CONTROL</div>
            </div>
        </div>
        <div class="header-right">
            <span class="live-dot" id="liveDot"></span><span class="last-updated" id="lastUpdated">Loading…</span>
            <a href="mission-control-v3.html">v3</a>
            <a href="team.html">Team</a>
            <a href="office.html">Office</a>
            <a href="https://hazeydata.ai">Site</a>
        </div>
    </div>

    <!-- ═══ CONTENT ═══ -->
    <div class="container">
        <div class="grid" id="grid">
            <div class="card"><h2>Loading…</h2></div>
        </div>
        <div class="footer" id="footer"></div>
    </div>

    <script>
    const JSON_URL = 'mission-control-content.json';

    async function load() {
        try {
            const r = await fetch(JSON_URL + '?t=' + Date.now());
            const d = await r.json();
            render(d);
        } catch(e) {
            document.getElementById('grid').innerHTML =
                '<div class="card"><h2>❌ Load Error</h2><p style="color:var(--accent-red-light);font-size:13px;">'+e.message+'</p></div>';
        }
    }

    function badgeClass(sc) {
        if (sc === 'done') return 'badge-done';
        if (sc === 'high') return 'badge-high';
        if (sc === 'medium') return 'badge-medium';
        return 'badge-active';
    }

    function render(d) {
        const ts = d.last_updated ? new Date(d.last_updated).toLocaleString() : 'Unknown';
        document.getElementById('lastUpdated').textContent = ts;

        // Live dot color based on data freshness
        const dot = document.getElementById('liveDot');
        if (d.last_updated) {
            const ageMin = (Date.now() - new Date(d.last_updated).getTime()) / 60000;
            dot.style.background = ageMin < 10 ? 'var(--accent-green)' : ageMin < 30 ? 'var(--accent-yellow)' : 'var(--accent-red-light)';
            dot.style.setProperty('--dot-color', dot.style.background);
        }

        let html = '';

        // ─── Today's Focus ───
        html += '<div class="card"><h2>🎯 Today\'s Priorities</h2>';
        (d.todays_focus || []).forEach(item => {
            html += `<div class="item"><span class="badge ${badgeClass(item.status_class)}">${item.status_text}</span><span class="item-text">${item.task}</span></div>`;
        });
        html += '</div>';

        // ─── /Ask Analytics ───
        if (d.ask_analytics) {
            const a = d.ask_analytics;
            html += '<div class="card"><h2>🤖 /Ask Analytics</h2><table>';
            html += `<tr><td>Questions</td><td class="val">${a.total_questions}</td></tr>`;
            html += `<tr><td>Unique Users</td><td class="val">${a.unique_users}</td></tr>`;
            html += `<tr><td>👍 / 👎</td><td class="val good">${a.thumbs_up} / ${a.thumbs_down}</td></tr>`;
            html += `<tr><td>Avg Response</td><td class="val">${(a.avg_response_ms/1000).toFixed(1)}s</td></tr>`;
            html += `<tr><td>Model</td><td class="val">${a.model}</td></tr>`;
            html += '</table></div>';
        }

        // ─── Accuracy ───
        if (d.accuracy) {
            const a = d.accuracy;
            html += '<div class="card"><h2>📊 Forecast Accuracy</h2><table>';
            html += '<tr><th>Metric</th><th>Cumulative</th><th>Yesterday</th></tr>';
            html += `<tr><td>Entity MAE</td><td class="val">${a.entity_mae}</td><td class="val">${a.yesterday_entity_mae || '—'}</td></tr>`;
            html += `<tr><td>WTI MAE</td><td class="val">${a.wti_mae}</td><td class="val good">${a.yesterday_wti_mae || '—'}</td></tr>`;
            html += `<tr><td>Entity Bias</td><td class="val">${a.entity_bias}</td><td>—</td></tr>`;
            html += `<tr><td>WTI Bias</td><td class="val">${a.wti_bias}</td><td>—</td></tr>`;
            html += `<tr><td>Days Eval</td><td class="val">${a.days_evaluated}</td><td>—</td></tr>`;
            html += '</table></div>';
        }

        // ─── Pipeline ───
        if (d.pipeline_status) {
            html += '<div class="card"><h2>🔧 Pipeline Status</h2>';
            Object.entries(d.pipeline_status).forEach(([key, p]) => {
                const bc = p.status === 'done' ? 'badge-done' : p.status === 'running' ? 'badge-active' : 'badge-medium';
                const label = p.status === 'done' ? '✅' : p.status === 'running' ? '🔄' : '⏳';
                html += `<div class="item"><span class="badge ${bc}">${label} ${p.status}</span><span class="item-text"><strong>${p.label}</strong> — ${p.detail}</span></div>`;
            });
            html += '</div>';
        }

        // ─── Infrastructure ───
        if (d.infrastructure) {
            const inf = d.infrastructure;
            html += '<div class="card"><h2>🖥️ Infrastructure</h2>';

            // Services
            (inf.services || []).forEach(s => {
                const bc = s.status === 'active' ? 'badge-done' : 'badge-high';
                html += `<div class="item"><span class="badge ${bc}">${s.status}</span><span class="item-text"><strong>${s.name}</strong> — ${s.detail}</span></div>`;
            });

            // Disk
            html += '<div class="section-label" style="margin-top:14px">Disk</div>';
            const mainPct = inf.disk_main_pct || 0;
            const dataPct = inf.disk_data_pct || 0;
            const mainColor = mainPct > 85 ? 'var(--accent-red-light)' : mainPct > 70 ? 'var(--accent-yellow)' : 'var(--accent-green)';
            const dataColor = dataPct > 85 ? 'var(--accent-red-light)' : 'var(--accent-green)';
            html += `<div class="disk-label">Main (/) — <span>${mainPct}%</span><div class="meter"><div class="meter-fill" style="width:${mainPct}%;background:${mainColor}"></div></div></div>`;
            html += `<div class="disk-label">Data (/mnt/data) — <span>${dataPct}%</span><div class="meter"><div class="meter-fill" style="width:${dataPct}%;background:${dataColor}"></div></div></div>`;

            // DB
            html += '<div class="section-label" style="margin-top:14px">Database</div><table>';
            html += `<tr><td>Entities</td><td class="val">${(inf.db_entities||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>Forecasts</td><td class="val">${(inf.db_forecasts||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>Live Waits</td><td class="val">${(inf.db_live_waits||0).toLocaleString()}</td></tr>`;
            html += `<tr><td>WTI</td><td class="val">${(inf.db_wti||0).toLocaleString()}</td></tr>`;
            html += '</table></div>';
        }

        // ─── Quick Links ───
        if (d.quick_links && d.quick_links.length) {
            html += '<div class="card"><h2>🔗 Quick Links</h2>';
            d.quick_links.forEach(link => {
                html += `<div class="item"><span class="item-text"><a href="${link.url}" style="color:var(--accent-light)">${link.label}</a></span></div>`;
            });
            html += '</div>';
        }

        // ─── Key Dates ───
        if (d.key_dates && d.key_dates.length) {
            html += '<div class="card"><h2>📅 Key Dates</h2>';
            d.key_dates.forEach(k => {
                html += `<div class="item"><span style="font-size:1.1rem">${k.emoji}</span><span class="item-text"><strong>${k.event}</strong> — ${k.date} ${k.urgency ? '<span class="badge badge-high">'+k.urgency+'</span>' : ''}</span></div>`;
            });
            html += '</div>';
        }

        document.getElementById('grid').innerHTML = html;
        document.getElementById('footer').innerHTML =
            'Auto-refreshes every 60s &nbsp;·&nbsp; <a href="https://hazeydata.ai">hazeydata.ai</a> &nbsp;·&nbsp; <a href="https://discord.gg/Bz89uXrD">Discord</a>';
    }

    load();
    setInterval(load, 60000);
    </script>
</body>
</html>
