<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HazeyData — Docs Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f1d32;
            --bg-card: rgba(255,255,255,0.05);
            --border-card: rgba(255,255,255,0.1);
            --border-accent: rgba(74,144,164,0.3);
            --accent: #4a90a4;
            --accent-light: #6bb5c9;
            --accent-red: #A60038;
            --accent-red-light: #e05577;
            --accent-orange: #fb923c;
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-purple: #c084fc;
            --accent-pink: #f472b6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --font-text: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            min-height: 100vh;
            font-family: var(--font-text);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* ═══════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-card);
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }
        .logo-sub {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .header-right a {
            color: var(--accent-light);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 4px 10px;
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            transition: all 0.2s;
        }
        .header-right a:hover {
            background: rgba(74,144,164,0.15);
            border-color: var(--accent);
        }

        /* ═══════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════ */
        .main {
            display: flex;
            min-height: calc(100vh - 57px);
        }

        .sidebar {
            width: 300px;
            min-width: 300px;
            padding: 20px;
            border-right: 1px solid var(--border-card);
            background: rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 57px;
            height: calc(100vh - 57px);
            overflow-y: auto;
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* ═══════════════════════════════════════════════════
           SEARCH
           ═══════════════════════════════════════════════════ */
        .search-container {
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-text);
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(74,144,164,0.15);
        }

        /* ═══════════════════════════════════════════════════
           FILTER SECTIONS
           ═══════════════════════════════════════════════════ */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-label {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-btn {
            padding: 5px 12px;
            font-size: 12px;
            font-family: var(--font-text);
            font-weight: 500;
            border: 1px solid var(--border-card);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
        }
        .filter-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
        }
        .filter-btn.active {
            background: rgba(74,144,164,0.2);
            border-color: var(--accent);
            color: var(--accent-light);
        }
        .filter-btn .count {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 4px;
            font-family: var(--font-mono);
        }
        .filter-btn.active .count {
            color: var(--accent);
        }

        /* Category color dots */
        .cat-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .cat-dot.pipeline { background: var(--accent-green); }
        .cat-dot.modeling { background: var(--accent-purple); }
        .cat-dot.infrastructure { background: var(--accent-orange); }
        .cat-dot.design { background: var(--accent-pink); }
        .cat-dot.data { background: var(--accent); }
        .cat-dot.api { background: var(--accent-yellow); }
        .cat-dot.streaming { background: var(--accent-red); }
        .cat-dot.business { background: #34d399; }

        /* ═══════════════════════════════════════════════════
           RESULTS HEADER
           ═══════════════════════════════════════════════════ */
        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .results-count {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
        }
        .sort-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-card);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--font-text);
            padding: 4px 8px;
            outline: none;
            cursor: pointer;
        }
        .sort-select:focus {
            border-color: var(--accent);
        }

        /* ═══════════════════════════════════════════════════
           DOC CARDS
           ═══════════════════════════════════════════════════ */
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .doc-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-accent, var(--accent));
            opacity: 0;
            transition: opacity 0.25s;
        }
        .doc-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--border-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .doc-card:hover::before {
            opacity: 1;
        }
        .doc-card-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .doc-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .doc-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }
        .doc-description {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
        }
        .doc-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }
        .doc-tag {
            font-size: 10px;
            font-family: var(--font-mono);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .doc-tag.category {
            background: rgba(74,144,164,0.15);
            color: var(--accent-light);
            border: 1px solid rgba(74,144,164,0.25);
        }
        .doc-tag.filetype {
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .doc-tag.size {
            color: var(--text-muted);
            font-size: 10px;
        }

        /* Category accent colors on cards */
        .doc-card[data-category="pipeline"] { --card-accent: var(--accent-green); }
        .doc-card[data-category="modeling"] { --card-accent: var(--accent-purple); }
        .doc-card[data-category="infrastructure"] { --card-accent: var(--accent-orange); }
        .doc-card[data-category="design"] { --card-accent: var(--accent-pink); }
        .doc-card[data-category="data"] { --card-accent: var(--accent); }
        .doc-card[data-category="api"] { --card-accent: var(--accent-yellow); }
        .doc-card[data-category="streaming"] { --card-accent: var(--accent-red); }
        .doc-card[data-category="business"] { --card-accent: #34d399; }

        /* ═══════════════════════════════════════════════════
           EMPTY STATE
           ═══════════════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ═══════════════════════════════════════════════════
           CLEAR FILTERS
           ═══════════════════════════════════════════════════ */
        .clear-filters {
            display: none;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--accent-light);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .clear-filters.visible {
            display: inline-block;
        }

        /* ═══════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                position: relative;
                top: 0;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-card);
            }
            .doc-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ═══════════════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* keyboard shortcut hint */
        .kbd {
            font-family: var(--font-mono);
            font-size: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--text-muted);
        }
    </style>
</head>

    // ═══════════════════════════════════════════════════
    // CATEGORY & TYPE CONFIG
    // ═══════════════════════════════════════════════════
    const categoryConfig = {
        pipeline:       { label: "Pipeline",       color: "pipeline" },
        modeling:        { label: "Modeling",        color: "modeling" },
        data:            { label: "Data",            color: "data" },
        api:             { label: "API & Bots",      color: "api" },
        infrastructure:  { label: "Infrastructure",  color: "infrastructure" },
        design:          { label: "Design",          color: "design" },
        streaming:       { label: "Streaming",       color: "streaming" },
        business:        { label: "Business",        color: "business" }
    };

    const typeConfig = {
        md:   { label: "Markdown", icon: "📝" },
        html: { label: "HTML",     icon: "🌐" }
    };

    // ═══════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════
    let activeCategories = new Set();
    let activeTypes = new Set();
    let searchQuery = "";

    // ═══════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════
    function init() {
        buildCategoryFilters();
        buildTypeFilters();
        renderDocs();
        document.getElementById("search").addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderDocs();
        });
        // / keyboard shortcut to focus search
        document.addEventListener("keydown", (e) => {
            if (e.key === "/" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) {
                e.preventDefault();
                document.getElementById("search").focus();
            }
            if (e.key === "Escape") {
                document.getElementById("search").blur();
            }
        });
    }

    function buildCategoryFilters() {
        const container = document.getElementById("category-filters");
        const counts = {};
        docs.forEach(d => { counts[d.category] = (counts[d.category] || 0) + 1; });

        Object.entries(categoryConfig).forEach(([key, cfg]) => {
            if (!counts[key]) return;
            const btn = document.createElement("button");
            btn.className = "filter-btn";
            btn.dataset.category = key;
            btn.innerHTML = `<span class="cat-dot ${cfg.color}"></span>${cfg.label}<span class="count">${counts[key]}</span>`;
            btn.onclick = () => toggleFilter("category", key, btn);
            container.appendChild(btn);
        });
    }

    function buildTypeFilters() {
        const container = document.getElementById("filetype-filters");
        const counts = {};
        docs.forEach(d => { counts[d.type] = (counts[d.type] || 0) + 1; });

        Object.entries(typeConfig).forEach(([key, cfg]) => {
            if (!counts[key]) return;
            const btn = document.createElement("button");
            btn.className = "filter-btn";
            btn.dataset.type = key;
            btn.innerHTML = `${cfg.icon} ${cfg.label}<span class="count">${counts[key]}</span>`;
            btn.onclick = () => toggleFilter("type", key, btn);
            container.appendChild(btn);
        });
    }

    function toggleFilter(kind, value, btn) {
        const set = kind === "category" ? activeCategories : activeTypes;
        if (set.has(value)) {
            set.delete(value);
            btn.classList.remove("active");
        } else {
            set.add(value);
            btn.classList.add("active");
        }
        updateClearButton();
        renderDocs();
    }

    function clearAllFilters() {
        activeCategories.clear();
        activeTypes.clear();
        searchQuery = "";
        document.getElementById("search").value = "";
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        updateClearButton();
        renderDocs();
    }

    function updateClearButton() {
        const btn = document.getElementById("clear-filters");
        const hasFilters = activeCategories.size > 0 || activeTypes.size > 0 || searchQuery;
        btn.classList.toggle("visible", hasFilters);
    }

    // ═══════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════
    function renderDocs() {
        let filtered = docs.filter(d => {
            if (activeCategories.size > 0 && !activeCategories.has(d.category)) return false;
            if (activeTypes.size > 0 && !activeTypes.has(d.type)) return false;
            if (searchQuery) {
                const hay = (d.title + " " + d.description + " " + d.file + " " + d.category).toLowerCase();
                return hay.includes(searchQuery);
            }
            return true;
        });

        // Sort
        const sortBy = document.getElementById("sort-select").value;
        filtered.sort((a, b) => {
            if (sortBy === "name") return a.title.localeCompare(b.title);
            if (sortBy === "name-desc") return b.title.localeCompare(a.title);
            if (sortBy === "category") return a.category.localeCompare(b.category) || a.title.localeCompare(b.title);
            if (sortBy === "size-desc") return (b.lines || 0) - (a.lines || 0);
            if (sortBy === "size-asc") return (a.lines || 0) - (b.lines || 0);
            return 0;
        });

        const grid = document.getElementById("doc-grid");
        const empty = document.getElementById("empty-state");

        if (filtered.length === 0) {
            grid.innerHTML = "";
            empty.style.display = "block";
        } else {
            empty.style.display = "none";
            grid.innerHTML = filtered.map(d => {
                const catCfg = categoryConfig[d.category];
                const typeCfg = typeConfig[d.type];
                const sizeStr = d.lines ? `${d.lines} lines` : "";
                // GitHub Pages raw link for markdown, direct for HTML
                const url = d.type === "html"
                    ? d.path
                    : `https://github.com/hazeydata/theme-park-crowd-report/blob/main/docs/${d.path}`;

                return `<a class="doc-card" data-category="${d.category}" href="${url}" target="_blank">
                    <div class="doc-card-header">
                        <span class="doc-icon">${d.icon}</span>
                        <div class="doc-title">${highlightMatch(d.title)}</div>
                    </div>
                    <div class="doc-description">${highlightMatch(d.description)}</div>
                    <div class="doc-meta">
                        <span class="doc-tag category"><span class="cat-dot ${catCfg.color}"></span>${catCfg.label}</span>
                        <span class="doc-tag filetype">${typeCfg.icon} ${d.type.toUpperCase()}</span>
                        ${sizeStr ? `<span class="doc-tag size">${sizeStr}</span>` : ""}
                    </div>
                </a>`;
            }).join("");
        }

        // Update counts
        document.getElementById("results-count").textContent =
            `${filtered.length} of ${docs.length} documents`;
        document.getElementById("doc-count-header").textContent =
            `${docs.length} docs`;
        updateClearButton();
    }

    function highlightMatch(text) {
        if (!searchQuery) return text;
        const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<mark style="background:rgba(74,144,164,0.35);color:#fff;border-radius:2px;padding:0 2px;">$1</mark>');
    }

    // GO
    init();
    </script>
