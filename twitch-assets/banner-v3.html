<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 480px;
      overflow: hidden;
      position: relative;
      background: #040C1F;
    }
    .bg-container {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 140%;
      height: 160%;
    }
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(4, 12, 31, 0.9) 0%, rgba(4, 12, 31, 0.4) 50%, rgba(4, 12, 31, 0.9) 100%);
    }
    .content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 10;
    }
    .logo {
      width: 380px;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(166, 0, 56, 0.3));
    }
    .tagline {
      text-align: left;
    }
    .tagline-line {
      font-size: 48px;
      font-weight: 500;
      color: #E9F4FF;
      letter-spacing: 1px;
      text-shadow: 0 0 30px rgba(0,0,0,0.5);
      margin: 5px 0;
    }
    .red-period { color: #A60038; }
    .accent-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, #A60038, #CA2360, #A60038, transparent);
    }
  </style>
</head>
<body>
  <div class="bg-container">
    <img src="homepage-bg.png" class="bg-image" alt="">
  </div>
  <div class="overlay"></div>
  <div class="content">
    <img src="logo_transparent.png" class="logo" alt="hazeydata.ai">
    <div class="tagline">
      <div class="tagline-line">Clear the Haze<span class="red-period">.</span></div>
      <div class="tagline-line">See the Future<span class="red-period">.</span></div>
    </div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
