<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 480px;
      overflow: hidden;
      position: relative;
      background: #040C1F;
    }
    .bg-container {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 140%;
      height: 160%;
    }
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(4, 12, 31, 0.9) 0%, rgba(4, 12, 31, 0.4) 50%, rgba(4, 12, 31, 0.9) 100%);
    }
    .content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 10;
    }
    .logo {
      width: 260px;
      height: 260px;
      filter: drop-shadow(0 0 30px rgba(166, 0, 56, 0.3));
    }
    .text {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .brand {
      font-size: 72px;
      font-weight: 700;
      color: #E9F4FF;
      letter-spacing: -2px;
      text-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .tagline {
      font-size: 28px;
      color: #9DCBFF;
      font-weight: 400;
      text-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .dot { color: #A60038; }
    .accent-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, #A60038, #CA2360, #A60038, transparent);
    }
  </style>
</head>
<body>
  <div class="bg-container">
    <img src="homepage-bg.png" class="bg-image" alt="">
  </div>
  <div class="overlay"></div>
  <div class="content">
    <img src="logo_dark.png" class="logo" alt="HazeyData">
    <div class="text">
      <div class="brand">hazeydata<span class="dot">.</span>ai</div>
      <div class="tagline">Clear the Haze with Data</div>
    </div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
