<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HazeyData — Be Right Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
            width: 1920px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Animated grid background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(74,144,164,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,144,164,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.02) 0px,
                rgba(0,0,0,0.02) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        .content {
            text-align: center;
            z-index: 100;
        }
        
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            color: #4a90a4;
            letter-spacing: 6px;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(74, 144, 164, 0.4);
        }
        
        .brb-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            animation: breathe 3s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { 
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            }
            50% { 
                opacity: 0.8;
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
            }
        }
        
        .subtext {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        
        .coffee-icon {
            font-size: 80px;
            margin: 40px 0;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            color: #4a90a4;
            margin-top: 40px;
        }
        
        .timer span {
            color: #6bb5c9;
        }
        
        /* Decorative elements */
        .deco-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(74, 144, 164, 0.3), transparent);
            height: 1px;
            width: 400px;
            left: 50%;
            transform: translateX(-50%);
        }
        .deco-line.top { top: 200px; }
        .deco-line.bottom { bottom: 200px; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="deco-line top"></div>
    <div class="deco-line bottom"></div>
    
    <div class="content">
        <div class="logo">HAZEYDATA.AI</div>
        <div class="coffee-icon">☕</div>
        <div class="brb-text">BE RIGHT BACK</div>
        <div class="subtext">// Taking a quick break</div>
        <div class="timer">Back in <span id="timer">a few minutes</span></div>
    </div>
    
    <script>
        // Optional timer (use ?minutes=5 in URL)
        const params = new URLSearchParams(window.location.search);
        if (params.get('minutes')) {
            let totalSeconds = parseInt(params.get('minutes')) * 60;
            
            function updateTimer() {
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('timer').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (totalSeconds > 0) {
                    totalSeconds--;
                    setTimeout(updateTimer, 1000);
                } else {
                    document.getElementById('timer').textContent = 'any moment now!';
                }
            }
            updateTimer();
        }
    </script>
</body>
</html>
